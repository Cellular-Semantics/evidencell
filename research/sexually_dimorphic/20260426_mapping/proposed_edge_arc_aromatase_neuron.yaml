  # Sex bias: male-biased

  # ── Mapping rationale ───────────────────────────────────────────
  # The DB scan confirmed that Cyp19a1 does not appear in any WMBv1 cluster
  # or supertype label — the marker is too specific to drive cluster naming.
  # A full DB scan found no ARH-located supertype carrying Cyp19a1 as a
  # defining marker. The best ARH candidates from the original scan were
  # SUPT_0427 and SUPT_0428 (ARH-PVi Six6 Dopa-Gaba supertypes), driven by
  # location and male sex bias. However, follow-up expression queries
  # revealed that SUPT_0486 (PVpo-VMPO-MPN Hmx2 Gaba) contains child cluster
  # CS20230722_CLUS_1907 with Cyp19a1 as a defining marker — the closest
  # functional match in the atlas to an aromatase-expressing neuron population.
  # SUPT_0486 has Cyp19a1 mean_expression = 1.15 at the supertype level.
  # The anatomical mismatch (POA/periventricular vs ARH) is the critical
  # constraint; see caveats below.

  evidence:
    - evidence_type: MARKER_OVERLAP
      supports: PARTIAL
      explanation: >
        Cyp19a1 is the defining marker of arc_aromatase_neuron. SUPT_0486 shows
        Cyp19a1 mean_expression = 1.15 at the supertype level — modest but present.
        Child cluster CS20230722_CLUS_1907 (under SUPT_0486) has Cyp19a1 as a
        defining marker, representing the most direct atlas-level correspondence to
        an aromatase-expressing population. The broader aromatase neuron network
        spans approximately 6,000 neurons across hypothalamus and amygdala
        (Wartenberg 2021), so Cyp19a1-expressing neurons are not confined to
        a single region in the atlas.

    - evidence_type: ANATOMY
      supports: AGAINST
      explanation: >
        The classical arc_aromatase_neuron is defined at MBA:223 (Arcuate
        hypothalamic nucleus). SUPT_0486 is located in PVpo-VMPO-MPN
        (periventricular preoptic / ventromedial preoptic / medial preoptic
        nucleus) — a preoptic zone entirely distinct from the arcuate. No cells
        in SUPT_0486 MERFISH data are assigned to MBA:223. This is a
        substantial anatomical discordance.

    - evidence_type: DB_SCAN_RESULT
      supports: INFORMATIVE
      explanation: >
        A full scan of the CCN20230722 taxonomy DB confirmed that no ARH-located
        supertype carries Cyp19a1 as a defining marker. The ARH Dopa-Gaba
        supertypes (SUPT_0427, SUPT_0428) were the strongest ARH candidates
        by location and sex bias but lack confirmed Cyp19a1 expression at the
        supertype level. All Cyp19a1-expressing clusters in WMBv1 that could be
        identified via precomputed expression data appear to be in POA/periventricular
        zones rather than ARH. This pattern may reflect genuine intermingling of
        aromatase neurons across the periventricular zone and ARH, or a MERFISH
        registration artefact at the ARH/periventricular boundary.

