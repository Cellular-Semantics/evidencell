      atlas_value: "MBA:133 PVpo (n=64), MBA:515 MPN (n=37), MBA:272 AVPV (n=16) — no MBA:223 cells"
      concordance: DISCORDANT
      notes: >
        ANATOMICAL DISCORDANCE. The classical type is defined in the arcuate
        nucleus (ARH, MBA:223). SUPT_0486 cells are located in the periventricular
