        from the ARH. This is the primary constraint driving UNCERTAIN confidence.

    - property: defining_marker_Cyp19a1
      classical_value: "Cyp19a1 — defining marker (transcript)"
      atlas_value: "Cyp19a1 mean_expression = 1.15 (supertype level); Cyp19a1 is a defining marker for child cluster CS20230722_CLUS_1907"
      concordance: PARTIAL
      notes: >
        Cyp19a1 is expressed in SUPT_0486 at a modest supertype-level mean (1.15),
        and is a defining marker for a child cluster (CLUS_1907). This is the
        strongest available marker evidence for a Cyp19a1-atlas correspondence.
        However, the expression level is modest at supertype resolution; the
        Cyp19a1-high cells may be a minority subpopulation within SUPT_0486.
        No ARH-located supertype showed higher Cyp19a1 expression in the DB scan.

  caveats:
    - caveat_type: ANATOMICAL_DISCORDANCE
      severity: HIGH
      description: >
        The classical arc_aromatase_neuron is defined in MBA:223 (Arcuate
        hypothalamic nucleus). SUPT_0486 is located in the periventricular
        preoptic zone (PVpo-VMPO-MPN), not the arcuate. This is a fundamental
        anatomical mismatch. The mapping is proposed on the basis of Cyp19a1
        marker correspondence (child cluster CLUS_1907) in the absence of any
        ARH-specific Cyp19a1-positive atlas cluster. Possible explanations:
        (1) aromatase neurons in the ARH and preoptic zone may represent a
        single transcriptomic type distributed across multiple anatomical zones
        (consistent with the ~6,000 neuron pan-hypothalamic aromatase network);
        (2) MERFISH registration at the ARH/periventricular boundary may
        misassign some ARH cells to periventricular coordinates; (3) the
        sexually dimorphic ARH aromatase cluster (Wartenberg 2021) may be too
        small or too transcriptomically similar to neighboring ARH populations
        to form a distinct supertype in WMBv1.

    - caveat_type: MARKER_EXPRESSION_LEVEL
      severity: MODERATE
      description: >
        Cyp19a1 mean_expression at the SUPT_0486 supertype level is 1.15 —
        modest. This suggests Cyp19a1-expressing cells are a minority within
        the supertype. Child cluster CS20230722_CLUS_1907 represents a more
        specific sub-match, but this edge is drawn at supertype level per the
        curator-approved mapping. A cluster-level edge to CLUS_1907 would be
        more specific but still anatomically discordant.

    - caveat_type: SINGLE_SOURCE_CLASSICAL_NODE
      severity: MODERATE
      description: >
        The arc_aromatase_neuron node is based on a single primary source
        (Wartenberg 2021 / PMID:34561233). The ARH location assignment depends
        entirely on this paper; independent confirmation of ARH-specific
        aromatase neuron identity is absent. If the Wartenberg interpretation
        of ARH location is nuanced (e.g., adjacent to ARH rather than within it),
        the anatomical discordance with SUPT_0486 may be reduced.

  unresolved_questions:
    - >
      Do any ARH-located clusters (under SUPT_0427, SUPT_0428, or TU-ARH
      supertypes) show detectable Cyp19a1 expression in the precomputed HDF5
      stats? If yes, those clusters should be compared against SUPT_0486 as
      alternative mapping targets.
    - >
      Is CS20230722_CLUS_1907 (Cyp19a1-defining child of SUPT_0486) located
      exclusively in POA/periventricular zones in MERFISH data, or do some
      cells appear in ARH-adjacent coordinates?
    - >
      Does the sexually dimorphic ARH aromatase population (male-biased) have
      a distinct transcriptomic identity from other aromatase neurons in the
      preoptic zone?

  proposed_experiments:
    - >
      Query precomputed expression for Cyp19a1 in all ARH-region supertypes
      (SUPT_0427, SUPT_0428, SUPT_0478-0480, SUPT_0493-0495) to determine
      whether any ARH cluster expresses Cyp19a1 at comparable or higher
      levels than SUPT_0486.
    - >
      Inspect MERFISH spatial coordinates for CS20230722_CLUS_1907 to confirm
      or refute POA-exclusive location.
    - >
      Request single-cell resolution Cyp19a1 data from the ABC atlas portal
