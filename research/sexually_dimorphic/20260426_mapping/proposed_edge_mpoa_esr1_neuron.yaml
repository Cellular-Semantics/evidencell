caveats:

  - caveat_type: CROSS_CUTTING
    description: >
      MPOA Esr1 neurons are heterogeneous (GABAergic + glutamatergic; multiple
      functional subtypes including parental behavior, male mating, female
      socio-sexual behavior via overlapping Nts+). The classical node may span
      multiple transcriptomic supertypes within the preoptic area. SUPT_0486 is
      the best single-supertype candidate but is unlikely to be the only one.
      Mapping should be interpreted as CROSS_CUTTING: the classical population
      partially overlaps SUPT_0486 and likely also other preoptic supertypes
      (e.g., glutamatergic supertypes in SUBC_133 or other Hmx2 Gaba supertypes).

  - caveat_type: HETEROGENEOUS_CLASSICAL_TYPE
    description: >
      Classical node notes acknowledge that MPOA Esr1 neurons 'may be better
      represented as multiple terms'. Until sub-typed into functionally distinct
      sub-populations, any single supertype mapping will underrepresent the
      full diversity of the classical node.

  - caveat_type: NT_TYPE_PARTIAL_MATCH
    description: >
      SUPT_0486 is GABAergic; the glutamatergic fraction of MPOA Esr1 neurons is
      not captured and would require identification of an appropriate preoptic
      glutamatergic supertype (not yet mapped).

unresolved_questions:
  - >
    Which specific clusters within SUPT_0486 carry the highest Esr1/Ar/Pgr
    expression and the strongest preoptic anatomical signal? These would be the
    best sub-resolution candidates.
  - >
    Does the Nts+ female socio-sexual subpopulation of MPOA Esr1 neurons map to
    SUPT_0486 or to a separate supertype? Nts expression in SUPT_0486 clusters
    should be checked.
  - >
    What is the sex ratio (male_female_ratio) within SUPT_0486 or its child
    clusters? MPOA is larger in males (male > female); male-biased clusters
    would be the primary mapping targets.
