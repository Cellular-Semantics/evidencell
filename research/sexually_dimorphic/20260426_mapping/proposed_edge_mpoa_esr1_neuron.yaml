property_comparisons:

  - property: nt_type
    classical_value: "mixed (GABAergic + glutamatergic; both documented in MPOA)"
    atlas_value: "GABAergic (Gaba subclass label)"
    match: PARTIAL
    notes: >
      Classical node notes record that MPOA Esr1 neurons are heterogeneous — both
      GABAergic and glutamatergic subtypes are present. SUPT_0486 is classified in a
      GABAergic subclass (PVpo-VMPO-MPN Hmx2 Gaba), matching the dominant NT type of
      MPOA neurons but not capturing the glutamatergic minority. GABAergic identity is
      expected for most MPOA principal neurons; the glutamatergic fraction would map
      to a different supertype (e.g., CS20230722_SUPT_0585 PVH-SO-PVa Otp Glut or a
      preoptic glutamatergic lineage not captured here).

  - property: anatomical_location
    compartment: SOMA
    classical_value: "MBA:464 (Medial preoptic nucleus / MPOA)"
    atlas_value: "MBA:515 (MPN; n=37), MBA:133 (PVpo; n=64), MBA:272 (AVPV; n=16)"
    match: CONSISTENT
    notes: >
      MBA:515 (Medial preoptic nucleus) is the same structure as MBA:464 in the
      classical node annotation — the classical source uses 'MPOA' as the broader
      name for the medial preoptic area, which encompasses MPN/MBA:515. PVpo
      (periventricular preoptic, MBA:133) and VMPO (ventromedial preoptic) are
      immediately adjacent preoptic subdivisions. AVPV (MBA:272) is a periventricular
      extension of the preoptic area; some Esr1+ neurons are known to extend into
      this region. Location match is strong.

