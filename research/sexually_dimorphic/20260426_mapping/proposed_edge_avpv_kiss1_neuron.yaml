  evidence:
    - evidence_type: PROPERTY_COMPARISON
      supports: PARTIAL
      explanation: >
        Esr1 (mean=7.72) is a defining marker of SUPT_0486 and a strong
        concordant marker for the classical node. Th (mean=2.72) and Kiss1
        (mean=0.62) are both expressed at the supertype level, consistent with
        a subset carrying the AVPV Kiss1/TH identity. The AVPV soma location
        (MBA:272, n=16) is present in SUPT_0486, supporting anatomical
        overlap. Two independent property classes (location + 3 marker genes)
        provide concordant evidence.

    - evidence_type: DATABASE_CANDIDATE
      supports: PARTIAL
      explanation: >
        SUPT_0486 received db_score=3 and assessment=WEAK in the rank-1
        discovery candidates for avpv_kiss1_neuron (primarily a GABAergic node
        search). However, for avpv_th_neuron (dopaminergic), SUPT_0486 was the
        top-ranked rank-1 candidate (assessment=STRONG), parent of the
        extreme-female-biased cluster CLUS_1915 (male_female_ratio=0.02). The
        curator-approved mapping targets SUPT_0486 for both AVPV Kiss1 and AVPV
        TH nodes on the basis of marker expression, AVPV spatial cells, and
        child cluster sex-ratio evidence.

  caveats:
    - caveat_type: SUPERTYPE_HETEROGENEITY
      description: >
        SUPT_0486 spans the periventricular preoptic zone (PVpo-VMPO-MPN) and
        contains at least three anatomically distinct preoptic cell populations
        (PVpo, MPN, AVPV). The classical AVPV/PeN Kiss1 neurons are a subset
        of this supertype. A cluster-level analysis within SUPT_0486 is needed
        to identify which child cluster(s) carry peak Kiss1 + Th + Esr1
        co-expression.

    - caveat_type: SEX_RATIO_UNCONFIRMED
      description: >
        At rank-1 (supertype level), no sex-ratio data are available for
        SUPT_0486 directly. The child cluster CLUS_1915 (male_female_ratio=0.02)
        is strongly female-biased, consistent with the female-biased AVPV Kiss1
        population, but this sex-ratio signal is diluted at supertype level.

    - caveat_type: ATLAS_RESOLUTION_LIMIT
      description: >
        WMBv1 MERFISH atlas does not segment AVPV as a distinct spatial region;
        the atlas labels AVPV cells within PVpo or generic Hypothalamus
        partitions. The n=16 AVPV-labeled cells in SUPT_0486 may underrepresent
        the true AVPV Kiss1 population (estimated >100 cells in female mice).

  unresolved_questions:
    - >
      Which cluster(s) within SUPT_0486 carry peak Kiss1 + Th + Esr1
      co-expression? Cluster-level inspection required.
    - >
      Do the PeN (periventricular posterior, MBA:341) Kiss1 neurons map to
      SUPT_0486 or to a different PVR supertype (e.g. SUPT_0418/0415)?
    - >
      Is the female bias (greater cell number in females) reflected in
      differential cluster abundance across sexes within SUPT_0486?

  proposed_experiments:
    - >
      Query atlas at cluster level within SUPT_0486 lineage for Kiss1, Th,
      Esr1 co-expression to identify AVPV Kiss1 candidate cluster(s).
    - >
      Annotate AVPV Kiss1 single-cell dataset (e.g. from Moffitt et al. 2018
      or similar MERFISH studies) to WMBv1 using MapMyCells for F1-based
      confirmation.
