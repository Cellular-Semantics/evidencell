    morphology:
      description: >
        Located in the arcuate nucleus. Not sexually dimorphic in cell number or Kiss1
        mRNA distribution between sexes. Generates pulsatile GnRH-mediated
        gonadotropin secretion in both sexes through inhibition by gonadal hormones.
        Receives sexually dimorphic afferent input despite monomorphic distribution:
        female KNDy cells receive a higher percentage of afferents from the rostral
        periventricular area (RP3V/PeN), with a greater fraction of those afferents
        co-expressing ERalpha in females.
      sources:
        - ref: "PMID:29201072"
          method: "literature description"
          scope: "adult mouse"
          quote_key: "1227024_4974dba1"
        - ref: "PMID:23407940"
          method: "literature description"
          scope: "adult mouse"
          quote_key: "11330110_b026342a"
        - ref: "PMID:35406710"
          method: "literature description"
          scope: "adult mouse"
          quote_key: "247882232_5b52821f"
    electrophysiology:
      description: >
        Heterogeneous pattern of cellular activity (firing and quiescent cells), but
        no bimodal RMP distribution. No sexually dimorphic pattern of cellular
        activity in the ARC, consistent with the lack of sex difference in Kiss1 mRNA
        distribution.
      sources:
        - ref: "PMID:23407940"
          method: "whole-cell patch-clamp"
          scope: "adult rodent"
          quote_key: "11330110_f261b092"
        - ref: "PMID:23407940"
