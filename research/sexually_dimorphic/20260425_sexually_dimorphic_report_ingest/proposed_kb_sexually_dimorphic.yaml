    morphology:
      description: >
        Female-biased sexually dimorphic TH-immunoreactive population: females have
        2-4 times more TH-positive neurons than males in the AVPV, with size
        differences in addition to number. The AVPV consists mainly of TH-positive
        neurons. Ovariectomy does not affect TH expression; chronic estradiol
        treatment reduces it. TH-ir lesioned females show lower maternal behavior,
        suggesting a role in sexually dimorphic parental behavior.
      sources:
