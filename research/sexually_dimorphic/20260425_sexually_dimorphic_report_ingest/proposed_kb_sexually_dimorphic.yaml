      both sexes / fighting in males), ERalpha+/Nkx2-1+/Tac1+ (female locomotion),
      and additional ERalpha-expressing subtypes with different projections and sex-
      related functions. 17 transcriptomic types identified by snRNA-seq (Kim 2019).
      HETEROGENEITY: may need to be split into multiple sub-nodes in future
      iterations. No CL term — candidate for new term(s).

