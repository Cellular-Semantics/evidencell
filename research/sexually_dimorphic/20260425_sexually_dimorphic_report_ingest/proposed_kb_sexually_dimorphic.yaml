            method: "literature description"
            scope: "adult mouse"
            quote_key: "143424909_2b990710"
    morphology:
      description: >
        Male-biased sexual dimorphism in PVN (males > females). The sex difference is
        not present at postnatal days 0, 4, or 21 — it emerges during puberty/early
        adulthood and persists in old mice (20-24 months). Adult gonadectomy reduces
        CRFR1-immunoreactive cells in males but not females. Restraint stress induces
        sexually dimorphic neural activation (males > females) measured by phospho-
        CREB co-localization.
      sources:
        - ref: "PMID:31055007"
          method: "literature description"
          scope: "adult mouse"
          quote_key: "143424909_2b990710"
    cl_mapping:
      cl_term:
        id: CL:4072021
        label: "corticotropin-releasing neuron"
        name_in_source: "corticotropin-releasing neuron"
      mapping_type: RELATED
      mapping_notes: >
        CL:4072021 defines neurons by CRH *secretion*, whereas the proposed PVN CRFR1
        node is defined by CRFR1 *receptor* expression. These are distinct
        populations: CRFR1+ PVN neurons receive CRH input, they do not necessarily
        secrete CRH. Mapping is RELATED only. No CL term for CRFR1-receptor-expressing
        neurons exists — potential CL contribution.
    is_terminal: false
    definition_references:
      - "PMID:31055007"
    notes: >
      Male-biased dimorphism (males > females). Sex difference emerges during
      puberty/early adulthood. Co-express estrogen receptor alpha (moderate) and
      androgen receptor (high), suggesting gonadal-hormone-dependent regulation.
      Single source (Rosinger 2019) for full characterization. CL:4072021
      (corticotropin-releasing neuron) is RELATED only — that term defines neurons
      by CRH *secretion*, while this node is defined by CRFR1 receptor expression.
      No exact CL term — candidate for new term.

