            ref: "PMID:23407940"
            method: "literature description"
            scope: "adult mouse"
            quote_key: "11330110_f135c1a8"
    morphology:
      description: >
        Female-biased sexually dimorphic population: females have a greater number of
        Kiss1 neurons in the AVPV than males. AVPV is larger in volume, contains more
        cells, and sends more projections to multiple reproduction-related brain
        regions in females than males. Most AVPV/PeN Kiss1 cells co-express tyrosine
        hydroxylase. Sexual dimorphism is established during the perinatal critical
        period through testosterone exposure.
      sources:
        - ref: "PMID:29201072"
          method: "literature description"
          scope: "adult mouse"
          quote_key: "1227024_3fcab8ab"
        - ref: "PMID:17213691"
          method: "literature description"
          scope: "adult mouse"
          quote_key: "1357086_85e3d032"
        - ref: "PMID:33910083"
          method: "literature description"
          scope: "adult mouse"
          quote_key: "233446934_e19240c2"
    electrophysiology:
      description: >
        Bimodal resting membrane potential influenced by KATP channels: type I
        (irregular firing) and type II (quiescent) populations. AVPV/PeN Kiss1 neurons
        display sexually dimorphic biophysical properties — male neurons exhibit
        higher action-potential frequency and receive more excitatory synaptic
        transmission (higher sEPSC frequency) compared to females.
      sources:
        - ref: "PMID:23407940"
          method: "whole-cell patch-clamp"
          scope: "adult rodent"
          quote_key: "11330110_f261b092"
        - ref: "PMID:23407940"
          method: "whole-cell patch-clamp"
          scope: "adult rodent"
          quote_key: "11330110_04c1f564"
    cl_mapping:
      cl_term:
        id: CL:4023123
        label: "hypothalamus kisspeptin neuron"
        name_in_source: "hypothalamus kisspeptin neuron"
      mapping_type: BROAD
      mapping_notes: >
        CL:4023123 covers all hypothalamic kisspeptin neurons. The AVPV/PeN (RP3V)
        population is Kiss1-only (not obligately KNDy), so the more specific
        CL:4023128 (RP3V KNDy neuron) is inappropriate as it requires NKB and
        dynorphin co-expression. A dedicated CL term for the AVPV/RP3V Kiss1 non-KNDy
        subpopulation does not yet exist — potential CL contribution.
    is_terminal: false
    definition_references:
      - "PMID:29201072"
      - "PMID:17213691"
      - "PMID:33910083"
      - "PMID:28660243"
      - "PMID:35406710"
    notes: >
      Female-biased dimorphism in cell number (greater in females). Mediates
      estrogen-positive feedback for the preovulatory GnRH/LH surge in females. Two
      electrophysiological subtypes (type I irregular, type II quiescent). Distinct
      from arcuate KNDy population which is not sexually dimorphic. Most AVPV/PeN
      Kiss1 cells co-express TH, overlapping the AVPV TH neuron population. CL term
      CL:4023123 is BROAD; AVPV/RP3V Kiss1 (non-KNDy) is a candidate for a new CL
      term.

