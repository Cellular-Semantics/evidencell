      cl_term:
        id: CL:4023127
        label: "arcuate nucleus of hypothalamus KNDy neuron"
        name_in_source: "arcuate nucleus of hypothalamus KNDy neuron"
      mapping_type: EXACT
      mapping_notes: >
        CL:4023127 is defined as a KNDy neuron in the arcuate nucleus of the
        hypothalamus, matching the proposed node exactly. Parent term CL:4023125 (KNDy
        neuron) carries WikipediaVersioned xref only; CL:4023127 carries
        PMID:30042117.
    is_terminal: false
    definition_references:
      - "PMID:29201072"
      - "PMID:23407940"
      - "PMID:35406710"
      - "https://doi.org/10.1210/JS.2019-SAT-426"
      - "PMID:31611573"
    notes: >
      Distinct from AVPV/PeN Kiss1 population (which is sexually dimorphic). KNDy
      cells co-express kisspeptin, neurokinin B, and dynorphin. Although the cell
      distribution is monomorphic, the afferent connectivity from RP3V/PeN/MPON is
      sexually dimorphic (female-biased). Mapped EXACT to CL:4023127.

