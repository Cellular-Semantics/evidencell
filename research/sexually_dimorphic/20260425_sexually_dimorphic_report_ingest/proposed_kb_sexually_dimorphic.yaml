    notes: >
      Female-biased dimorphism (larger and more numerous in females). Distinguished
      from calbindin+ principal nucleus of BNST (Kiss1+, male-biased). Type II ephys
      classification within dlBNST. CL:4072021 (corticotropin-releasing neuron) is a
      BROAD match — a BNST-specific child term is a candidate for new CL
      contribution.

