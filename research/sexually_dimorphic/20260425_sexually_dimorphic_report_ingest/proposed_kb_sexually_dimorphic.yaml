        neurons in the dorsolateral BNST than males. The sex difference is not evident
        at postnatal day 5 and emerges by adulthood. Ovariectomy reduces CRF neuron
        number in females; orchiectomy increases it in males. CRF neurons in dlBNST
        lack calbindin (in contrast to the calbindin+ principal nucleus of BNST).
        Modulates pain sensitivity via CRF release.
      sources:
