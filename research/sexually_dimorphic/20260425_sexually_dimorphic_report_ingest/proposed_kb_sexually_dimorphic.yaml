        ERalpha + Nkx2-1 + Tac1 promotes hormone-dependent female locomotion. snRNA-
        seq identified 17 transcriptomic types, several sexually dimorphic. VMHvl is
        essential for lordosis behavior in females through projections to PAG,
        brainstem, and spinal motor circuits.
