# --- Evidence item 6 ---
# Target field: morphology_notes
# Source: asta_snippet | section: Identification and functional connectivity of IS3 cells | CorpusId:23480858
- node_id: is_interneuron_hippocampus
  evidence_type: LITERATURE
  reference: "PMID:24671999"
  snippet: "IS3 cells in the mouse hippocampus were similar to those described originally in the rat hippocampus. These cells innervated heavily the O/A border, although occasional axonal branches were found in the RAD and PYR. Their dendritic arbors were often unipolar (47% of cells), suggesting that these cells are preferentially recruited through the activation of the Schaffer collaterals"
  support: SUPPORT
  target_field: morphology_notes

