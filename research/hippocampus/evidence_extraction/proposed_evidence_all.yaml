  snippet: "This subtype of IS cells exhibited a remarkable anatomical diversity, with cell bodies that occupied different layers and an axon that projected mostly within the RAD and PYR. Similar to IS3 cells, IS1 cells exhibited a high input resistance but were more heterogeneous in terms of firing properties. Therefore, more than one subtype of putative IS1 cells is likely to be found within this group of CR-positive interneurons."
