            method: "review (stage 5 marker profile)"
            scope: "adult dentate gyrus — stage 5"
            quote_key: "279046466_b2e95c41"
            marker_type: PROTEIN
          - ref: "https://doi.org/10.5114/ppn.2021.111950"
            method: "review (marker classification)"
            scope: "adult dentate gyrus immature neurons"
            quote_key: "252063749_e1c84f70"
            marker_type: PROTEIN
      - symbol: PSA-NCAM
        ncbi_gene_id: null
        sources:
          - ref: "https://doi.org/10.5114/ppn.2021.111950"
            method: "review (marker classification)"
            scope: "adult dentate gyrus immature neurons"
            quote_key: "252063749_e1c84f70"
            marker_type: PROTEIN
      - symbol: Tis21
        modifier: "reappears during maturation phase (stage 5)"
        ncbi_gene_id: null
        sources:
          - ref: "PMID:19482889"
            method: "Tis21-GFP knock-in mouse + IHC"
            scope: "adult mouse hippocampus maturing neurons"
            quote_key: "13799502_a8f3d219"
            marker_type: PROTEIN
    negative_markers:
      - symbol: Calbindin
        modifier: "absent at immature stage; appears only at stage 6"
        ncbi_gene_id: null
    neuropeptides: []
    morphology_notes: >
      Postmitotic neurons (stage 5) that have migrated from the subgranular
      zone into the inner granule cell layer. Distinct morphological stages
      progress over weeks: axonal projections reach CA3 by 10–11 days after
      viral infection, 5–6 days before the first dendritic spines appear.
      Peak spine growth occurs during the first 3–4 weeks, but further
      structural modifications continue for months. Newly generated immature
      neurons move into the inner GCL and differentiate into dentate
      granule cells.
    morphology_sources:
      - ref: "PMID:16399667"
        method: "retrovirus-mediated gene transduction + confocal"
        scope: "adult mouse dentate gyrus newborn granule neurons"
        quote_key: "7440369_a91d2c33"
      - ref: "PMID:40519263"
        method: "review (stage 5 maturation)"
        scope: "adult dentate gyrus"
        quote_key: "279046466_b2e95c41"
      - ref: "PMID:26880934"
        method: "review (neural stem cell niche)"
        scope: "adult hippocampus"
        quote_key: "25925289_d7e23b55"
    electrophysiology_class: >
      Synaptically integrating. Receive glutamatergic input from entorhinal
      cortex and begin to form projections to CA3 during morphological
      maturation. Morphological maturation (and by extension functional
      integration) is differentially affected by age and experience
      (e.g., housing conditions); full synaptic integration extends over
      weeks to months.
    ephys_sources:
      - ref: "PMID:26056581"
        method: "review (adult neurogenesis connectivity)"
        scope: "adult dentate gyrus newborn granule cells"
        quote_key: "245432259_7c3e9a44"
      - ref: "PMID:16399667"
        method: "retrovirus-mediated gene transduction + confocal"
        scope: "adult mouse dentate gyrus newborn granule neurons"
        quote_key: "7440369_a91d2c33"
    location_sources:
      - ref: "PMID:28168008"
        method: "review (neurogenesis)"
        scope: "adult hippocampal inner GCL"
        quote_key: "148569364_529ba03c"
      - ref: "PMID:26880934"
        method: "review (neural stem cell niche)"
        scope: "adult hippocampus inner GCL"
        quote_key: "25925289_d7e23b55"
      - ref: "PMID:26056581"
        method: "review (adult neurogenesis)"
        scope: "adult dentate gyrus inner GCL"
        quote_key: "245432259_7c3e9a44"
    colocated_types:
      - neighboring_type: "CA3 pyramidal cells"
        spatial_relationship: "DISTAL"
        notes: "Target of developing mossy fiber axonal projections from immature granule neurons (PMID:26056581, quote_key=245432259_7c3e9a44)."
      - neighboring_type: "entorhinal cortex projection neurons"
        spatial_relationship: "DISTAL"
        notes: "Source of glutamatergic afferents to maturing granule neurons (PMID:26056581, quote_key=245432259_7c3e9a44)."
    # cl_mapping omitted — no existing CL term for stage-5 DG immature
    # granule neuron. Proposed new term captured in proposed_cl_term.
    proposed_cl_term:
      cl_id: "CL:9900002"
      label: "dentate gyrus immature granule neuron"
      parent_cl_term:
        id: CL:0000031
        label: "neuroblast (sensu Vertebrata)"
        name_in_source: "neuroblast"
      definition: >
        A neuroblast (sensu Vertebrata) that is a postmitotic immature granule
        neuron (stage 5) of the dentate gyrus. These cells co-express DCX and
        NeuN, have migrated from the subgranular zone into the inner granule
        cell layer, and represent the transitional maturation stage between
        DCX-only type-3 neuroblasts and terminally differentiated calbindin+
        granule neurons.
      comment: >
        Proposed to fill the gap between CL:0000031 (neuroblast) and CL:2000089
        (dentate gyrus granule cell). Mapping confidence: CANDIDATE.
      status: "DRAFT"
    definition_references:
      - "PMID:40519263"
      - "PMID:16399667"
      - "PMID:19482889"
      - "PMID:26056581"
    is_terminal: false
    notes: >
      Represents the stage-5 postmitotic immature granule neuron of Micheli
      et al. (DCX+/NeuN+), distinct from the upstream type-3 proliferative
      neuroblast (DCX+ only) and the downstream terminally-differentiated
      mature granule neuron (Calbindin+/NeuN+). Tis21 expression reappears
      during this maturation phase, potentially related to final functional
      integration. AMBIGUITY: No dedicated UBERON term for SGZ/inner GCL;
      dentate gyrus (UBERON:0001885) used as container. No existing CL term;
      proposed new term CL:9900002 (see proposed_cl_term) to resolve the gap
      between CL:0000031 (neuroblast) and CL:2000089 (mature granule cell).

