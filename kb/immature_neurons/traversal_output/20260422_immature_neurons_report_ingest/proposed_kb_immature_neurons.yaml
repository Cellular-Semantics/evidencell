# Draft KB — immature_neurons (multi-region)
# Source: ASTA deep research report — inputs/deepsearch/Immature Neuron Cell Types and Development Across Brain Regions.pdf
# Ingestion date: 2026-04-22
# Status: DRAFT — node metadata from ASTA report, pending primary verification
# Property assertions reference quotes in kb/draft/immature_neurons/references.json
# Classical nodes proposed by: asta-report-ingest
# Regions: Dentate Gyrus (3 nodes), Piriform Cortex, Olfactory Bulb, Striatum, Cerebral Cortex

name: "Immature Neuron Cell Types Across Brain Regions"
description: >
  Evidence graph for classical immature neuron cell types across five brain
  regions: dentate gyrus (three nodes — neuroblast/type-3 progenitor,
  immature granule neuron, mature granule neuron), olfactory bulb
  (SVZ-derived neuroblast / immature interneuron), piriform cortex
  (layer II immature neuron), striatum (SVZ-derived immature neuron), and
  cerebral cortex (layer II immature neuron). Classical cell types defined
  by marker expression, maturational stage, and anatomical location.

target_atlas: "NOT_APPLICABLE_CLASSICAL_ONLY"

species: null  # Multiple species referenced (mouse, rat, human, guinea pig, degu) — to be confirmed from primary literature

creation_date: "2026-04-22"


# ══════════════════════════════════════════════════════════════════
# NODES
# ══════════════════════════════════════════════════════════════════

nodes:

  # ── Dentate Gyrus Neuroblast (Type-3 Progenitor) ────────────────

  - id: dg_neuroblast
    name: "Dentate Gyrus Neuroblast (Type-3 Progenitor)"
    definition_basis: CLASSICAL_NEUROCHEMICAL
    species: null  # To be confirmed — studies cite mouse, rat, human
    anatomical_location:
      - id: UBERON:0001885
        label: "dentate gyrus of hippocampal formation"
        name_in_source: "subgranular zone (SGZ) of dentate gyrus"
    nt_type:
      name_in_source: "glutamatergic (committed but not yet functional)"
      cl_terms: []
      sources:
        - ref: "PMID:18385329"
          method: "Tbr2-GFP transgene + IHC (TF cascade marks glutamatergic lineage)"
          scope: "adult mouse hippocampus SGZ"
          quote_key: "15994456_c3a87b12"
        - ref: "PMID:23667508"
          method: "review (adult neurogenesis)"
          scope: "dentate gyrus lineage"
          quote_key: "8479504_a44f9b22"
    defining_markers:
      - symbol: DCX
        ncbi_gene_id: null
        sources:
          - ref: "https://doi.org/10.5114/ppn.2021.111950"
            method: "review (marker classification)"
            scope: "adult dentate gyrus neuroblasts"
            quote_key: "252063749_e1c84f70"
            marker_type: PROTEIN
          - ref: "PMID:40519263"
            method: "review (type-3 neuroblast marker)"
            scope: "adult dentate gyrus — type-3 neuroblast"
            quote_key: "279046466_b2e95c41"
            marker_type: PROTEIN
      - symbol: PSA-NCAM
        ncbi_gene_id: null
        sources:
          - ref: "https://doi.org/10.5114/ppn.2021.111950"
            method: "review (marker classification)"
            scope: "adult dentate gyrus migrating neuroblasts"
            quote_key: "252063749_e1c84f70"
            marker_type: PROTEIN
      - symbol: Ki67
        modifier: "proliferative marker"
        ncbi_gene_id: null
        sources:
          - ref: "https://doi.org/10.5114/ppn.2021.111950"
            method: "review (marker classification)"
            scope: "adult dentate gyrus neuroblasts"
            quote_key: "252063749_e1c84f70"
            marker_type: PROTEIN
      - symbol: Nestin
        modifier: "type-2b stage only (co-expressed with DCX)"
        ncbi_gene_id: null
        sources:
          - ref: "PMID:40519263"
            method: "review (type-2b neuroblast marker)"
            scope: "adult dentate gyrus — type-2b stage"
            quote_key: "279046466_b2e95c41"
            marker_type: PROTEIN
      - symbol: Tbr2
        modifier: "intermediate progenitor (type-2) stage"
        ncbi_gene_id: null
        sources:
          - ref: "PMID:18385329"
            method: "Tbr2-GFP transgene + IHC"
            scope: "adult mouse hippocampus intermediate progenitors"
            quote_key: "15994456_c3a87b12"
            marker_type: PROTEIN
      - symbol: Tis21
        modifier: "type-2/3 progenitors (transit-amplifying stages)"
        ncbi_gene_id: null
        sources:
          - ref: "PMID:19482889"
            method: "Tis21-GFP knock-in mouse + IHC"
            scope: "adult mouse hippocampus transit-amplifying progenitors"
            quote_key: "13799502_a8f3d219"
            marker_type: PROTEIN
    negative_markers:
      - symbol: NeuN
        modifier: "NeuN negative at type-3 neuroblast stage"
        ncbi_gene_id: null
      - symbol: Calbindin
        modifier: "absent until stage 6 (mature granule cell)"
        ncbi_gene_id: null
      - symbol: GFAP
        modifier: "absent in type-2/3 neuroblasts (distinguishes from type-1 RGL)"
        ncbi_gene_id: null
    neuropeptides: []
    morphology_notes: >
      Migratory precursor cells in the SGZ; they migrate only a few micrometers
      from the subgranular zone toward the inner granule cell layer. The
      lineage progresses through type-2a (Nestin+/Sox2+), type-2b (Nestin+/DCX+),
      and type-3 (DCX+ only) stages; all are transit-amplifying progenitors
      with progressively increasing neuronal commitment. Type-3 cells are
      proliferative (Ki67+) and represent the last mitotic stage before
      postmitotic differentiation. A transcription factor cascade
      (Pax6 > Ngn2 > Tbr2 > NeuroD > Tbr1) marks stage transitions.
    morphology_sources:
      - ref: "PMID:40519263"
        method: "review (lineage stages)"
        scope: "adult dentate gyrus neuroblast lineage"
        quote_key: "279046466_b2e95c41"
      - ref: "https://doi.org/10.2131/jts.44.357"
        method: "review (type-3 progenitor differentiation)"
        scope: "adult rat dentate gyrus"
        quote_key: "233432690_f9d72c88"
    electrophysiology_class: >
      Not synaptically integrated. Precursor electrophysiological properties
      (patch-clamp / intrinsic) are not characterized in detail in this
      report; the proliferating type-3 stage precedes postmitotic maturation
      and full synaptic integration.
    ephys_sources: []
    location_sources:
      - ref: "PMID:28168008"
        method: "review (neurogenesis)"
        scope: "adult hippocampal SGZ"
        quote_key: "148569364_529ba03c"
    colocated_types:
      - neighboring_type: "type-1 RGL stem cells"
        spatial_relationship: "ADJACENT"
        notes: "Immediate lineage precursors in SGZ niche (PMID:40519263, quote_key=279046466_b2e95c41)."
    cl_mapping:
      cl_term:
        id: CL:0000031
        label: "neuroblast (sensu Vertebrata)"
        name_in_source: "neuroblast / type-3 progenitor"
      mapping_type: BROAD
      mapping_notes: >
        CL:0000031 is the canonical vertebrate neuroblast class and encompasses
        SGZ-born migrating DCX+ type-3 neuroblasts. CL:1000042 (forebrain
        neuroblast) is a closer BROAD subclass. No dentate-gyrus-specific
        neuroblast term exists in CL; CL:2000089 (dentate gyrus granule cell)
        covers only the mature, terminally differentiated stage.
    definition_references:
      - "PMID:40519263"
      - "PMID:18385329"
      - "PMID:19482889"
    is_terminal: false
    notes: >
      HETEROGENEITY: The node captures type-3 neuroblasts primarily; type-2a
      (Nestin+/Sox2+) and type-2b (Nestin+/DCX+) earlier stages are related
      but distinct intermediate progenitors and may warrant separate sub-nodes.
      No dedicated UBERON term for subgranular zone; dentate gyrus
      (UBERON:0001885) used as container.

  # ── Dentate Gyrus Immature Granule Neuron ───────────────────────

  - id: dg_immature_granule_neuron
    name: "Dentate Gyrus Immature Granule Neuron"
    definition_basis: CLASSICAL_NEUROCHEMICAL
    species: null  # To be confirmed — studies cite mouse, rat, human
    anatomical_location:
      - id: UBERON:0001885
        label: "dentate gyrus of hippocampal formation"
        name_in_source: "inner granule cell layer (GCL) of dentate gyrus"
    nt_type:
      name_in_source: "glutamatergic"
      cl_terms: []
      sources:
        - ref: "PMID:26056581"
          method: "review (adult neurogenesis)"
          scope: "adult dentate gyrus newborn granule cells"
          quote_key: "245432259_7c3e9a44"
        - ref: "https://doi.org/10.3389/fnins.2015.00110"
          method: "commentary (adult neurogenesis)"
          scope: "dentate gyrus lineage"
          quote_key: "13752593_c44e8b77"
    defining_markers:
      - symbol: DCX
        modifier: "stage 5 — immature postmitotic"
        ncbi_gene_id: null
        sources:
          - ref: "PMID:40519263"
            method: "review (stage 5 marker profile)"
            scope: "adult dentate gyrus — stage 5 immature granule neuron"
            quote_key: "279046466_b2e95c41"
