        quote_key: "7393550_c82d5b11"
    colocated_types: []
    cl_mapping:
      cl_term:
        id: CL:4042029
        label: "cortical immature neuron"
        name_in_source: "cortical immature neuron (layer II)"
      mapping_type: EXACT
      mapping_notes: >
        CL:4042029 (immature neuron of cerebral cortex developing prenatally
        and remaining immature throughout life) is an EXACT match. The
        proposed type (DCX+/NeuN-, layer II of neocortex, limbic cortex
        predominance, species-dependent) is precisely the non-neurogenic
        cortical immature neuron class that CL:4042029 was created to
        represent. CL:4042028 (CNS immature neuron) is the broader parent.
    definition_references:
      - "PMID:33994960"
      - "PMID:26321922"
      - "PMID:15684031"
    is_terminal: false
    notes: >
      CONTRADICTION: Dayer et al. (2005) reported no DCX+ cells in rodent
      neocortex (contradicting degu and guinea pig findings). AMBIGUITY:
      presence of cortical immature neurons is species-dependent; findings
      in degu and guinea pig contrast with earlier mouse/rat reports. GAP:
      no ephys, no neuropeptides, NT type unspecified, subtypes not
      defined. No dedicated UBERON term for cortical layer II; neocortex
      (UBERON:0001950) used as container.


