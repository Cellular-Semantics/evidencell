            marker_type: PROTEIN
    negative_markers: []
    neuropeptides: []
    morphology_notes: >
      BrdU+/DCX+ cells are detected within the striatum, consistent with
      migrating neuroblasts at various stages of migration and early
      differentiation from the SVZ. No detailed morphological maturation
      stages are described for this region in the report.
    morphology_sources:
      - ref: "PMID:15684031"
        method: "BrdU pulse-chase + IHC"
        scope: "adult mouse striatum"
        quote_key: "14221248_f77b1e11"
    electrophysiology_class: >
      No electrophysiological characterization is described. Adult striatal
      neurogenesis is described as quantitatively limited and controversial,
      with few immature neurons successfully integrating.
    ephys_sources: []
    location_sources:
      - ref: "PMID:15684031"
        method: "BrdU + IHC"
        scope: "adult mouse striatum"
        quote_key: "14221248_f77b1e11"
    colocated_types: []
    cl_mapping:
      cl_term:
        id: CL:0000031
        label: "neuroblast (sensu Vertebrata)"
        name_in_source: "immature neuron (SVZ-derived)"
      mapping_type: BROAD
      mapping_notes: >
        No CL term for a striatum-specific immature/neuroblast cell exists.
        CL:0000031 used as BROAD placeholder parent; striatal adult
        neurogenesis is thin and controversial. Potential CL contribution if
        confirmed. CL:0002613 (striatum neuron) applies only post-integration
        and is not a match.
    definition_references:
      - "PMID:15684031"
    is_terminal: false
    notes: >
      GAP: minimal characterisation — only one quote supports this node
      (single study), and no subtypes, ephys, or morphological detail are
      available. AMBIGUITY: adult striatal neurogenesis is quantitatively
      limited and controversial. Cells are presumed to be inhibitory
      interneurons by analogy with SVZ-derived OB interneurons, but final
      interneuron subtypes and developmental progression require further
      characterisation. NT type not directly supported by any quote for
      striatal cells. BrdU is a thymidine analogue used as birth-dating
      label (not a true protein/transcript marker); retained here with
      marker_type=PROTEIN as an expedient for schema compliance — flag for
      curator review.

  # ── Cerebral Cortex Layer II Immature Neuron ────────────────────

