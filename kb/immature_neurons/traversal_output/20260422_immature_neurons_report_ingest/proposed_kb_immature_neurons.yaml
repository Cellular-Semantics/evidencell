        method: "review (connectivity)"
        scope: "adult dentate gyrus"
        quote_key: "245432259_7c3e9a44"
    electrophysiology_class: >
      Fully synaptically integrated. Functionally mature with established
      primary glutamatergic input from entorhinal cortex and mossy fiber
      output to inhibitory interneurons and pyramidal cells of area CA3.
      Tis21 expression decreases in mature granule cells compared to the
      maturing stage.
    ephys_sources:
