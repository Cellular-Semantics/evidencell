    neuropeptides: []
    morphology_notes: >
      Immature neurons in layer II of the piriform cortex are classified by
      morphology into (1) tangled cells: very small cells with very short and
      intricate processes (least mature); (2) complex cells: more mature,
      displaying axon initial segments (AIS) and typical apical dendrites
      extending into layer I. Additional transitional forms include
      semilunar-pyramidal transitional neurons and scarce cells resembling
      semilunar, pyramidal, and fusiform neurons. Most cells lack synaptic
      contacts and are covered by astroglial lamellae. They are generated
      prenatally (primarily around E15.5 in rat) and persist in an immature
      state into adulthood.
    morphology_sources:
      - ref: "PMID:18245040"
        method: "IHC + morphology"
        scope: "adult rat paleocortex layer II"
        quote_key: "18166210_f74d2a66"
      - ref: "PMID:34072166"
        method: "review (PCX layer II subtypes)"
        scope: "adult mouse piriform cortex"
        quote_key: "15727849_e52b3f99"
    electrophysiology_class: >
      Cells fail to express cellular activity markers such as c-Fos or Arc, and
      lack NMDA and glucocorticoid receptors, consistent with a prolonged
      non-integrated immature state. Most lack synaptic contacts. A
      subpopulation is associated with synaptic plasticity and progressively
      resumes maturation into glutamatergic (TBR1+, CaMKII+) neurons.
    ephys_sources:
      - ref: "PMID:18245040"
        method: "IHC (activity markers)"
        scope: "adult rat paleocortex layer II"
        quote_key: "18166210_f74d2a66"
      - ref: "PMID:29688272"
        method: "IHC + fate-mapping"
        scope: "adult murine piriform cortex"
        quote_key: "235300723_e71a4b88"
      - ref: "PMID:23667508"
        method: "review (plasticity)"
        scope: "piriform cortex"
        quote_key: "8479504_b31e7c55"
    location_sources:
      - ref: "PMID:29688272"
        method: "IHC"
        scope: "adult murine piriform cortex"
        quote_key: "235300723_d93c1a55"
      - ref: "PMID:18245040"
        method: "IHC"
        scope: "adult rat paleocortex layer II"
        quote_key: "18166210_f74d2a66"
    colocated_types: []
    cl_mapping:
      cl_term:
        id: CL:4042028
        label: "immature neuron"
        name_in_source: "immature neuron"
      mapping_type: BROAD
      mapping_notes: >
        CL:4042028 (CNS immature neuron not newly derived from neurogenesis,
        not committed to differentiated fate, does not integrate into circuits)
        matches the biology (DCX+/PSA-NCAM+, no c-Fos/Arc, no NMDA receptors,
        prolonged non-integrated state). BROAD because CL:4042028 is CNS-wide;
        no piriform-cortex-specific immature neuron term exists in CL.
        CL:4042029 (cortical immature neuron) is neocortex-scoped and does not
        apply (piriform cortex is paleocortex/allocortex).
    definition_references:
      - "PMID:29688272"
      - "PMID:18245040"
      - "PMID:34072166"
      - "PMID:36078144"
      - "PMID:23667508"
    is_terminal: false
    notes: >
      HETEROGENEITY: the proposed type spans two main morphological subtypes
      (tangled cells and complex cells) plus additional transitional forms
      (semilunar-pyramidal transitional neurons, etc.); may warrant sub-nodes.
      DEVELOPMENTAL ORIGIN: prenatally generated, distinct from adult
      neurogenesis seen in SGZ/SVZ. A cross-species AMBIGUITY exists: in degu
      cerebral cortex DCX+ cells are sparse in piriform cortex compared with
      limbic neocortex (Groen et al., 2021), contrasting with mouse/rat
      reports.

  # ── Olfactory Bulb Neuroblast / Immature Interneuron ────────────

  - id: ob_neuroblast
    name: "Olfactory Bulb Neuroblast / Immature Interneuron"
    definition_basis: CLASSICAL_NEUROCHEMICAL
    species: null  # To be confirmed — studies cite mouse, rat
    anatomical_location:
      - id: UBERON:0002264
        label: "subventricular zone"
        name_in_source: "subventricular zone (SVZ) / rostral migratory stream (RMS) / olfactory bulb"
    nt_type:
      name_in_source: "GABAergic (terminal interneuron fate)"
      cl_terms: []
      sources:
        - ref: "PMID:37488837"
          method: "review (terminal fates)"
          scope: "adult olfactory bulb"
          quote_key: "10712122_b12c9e55"
        - ref: "https://doi.org/10.3389/fnins.2015.00110"
          method: "commentary (adult neurogenesis)"
          scope: "olfactory bulb"
          quote_key: "13752593_c44e8b77"
        - ref: "PMID:23667508"
          method: "review (adult neurogenesis)"
          scope: "olfactory bulb interneurons"
          quote_key: "8479504_a44f9b22"
    defining_markers:
      - symbol: DCX
        ncbi_gene_id: null
        sources:
          - ref: "https://doi.org/10.5114/ppn.2021.111950"
            method: "review (marker classification)"
            scope: "adult SVZ"
            quote_key: "252063749_e1c84f70"
            marker_type: PROTEIN
      - symbol: PSA-NCAM
        ncbi_gene_id: null
        sources:
          - ref: "PMID:9185542"
            method: "EM + IHC"
            scope: "adult mouse SVZ type A cells"
            quote_key: "625292_d93a2b77"
            marker_type: PROTEIN
      - symbol: TuJ1
        modifier: "beta-tubulin"
        ncbi_gene_id: null
        sources:
          - ref: "PMID:9185542"
            method: "IHC"
            scope: "adult mouse SVZ type A cells"
            quote_key: "625292_d93a2b77"
            marker_type: PROTEIN
      - symbol: Nestin
        ncbi_gene_id: null
        sources:
          - ref: "PMID:9185542"
            method: "IHC"
            scope: "adult mouse SVZ type A cells"
            quote_key: "625292_d93a2b77"
            marker_type: PROTEIN
    negative_markers:
      - symbol: GFAP
        ncbi_gene_id: null
      - symbol: vimentin
        ncbi_gene_id: null
    neuropeptides: []
    morphology_notes: >
      Type A neuroblasts have the ultrastructure of migrating neuronal
      precursors, arranged as chains parallel to the walls of the lateral
      ventricle and ensheathed by two ultrastructurally distinct astrocytes
      (Type B1 and B2). They migrate via chain migration through the RMS
      (3–8 mm) to the olfactory bulb, then leave the RMS and migrate radially
      toward the glomeruli where they differentiate into interneurons. In the
      OB terminal fate splits into GABAergic granule neurons (granule cell
      layer, majority) and GABAergic periglomerular neurons (glomerular
      layer).
    morphology_sources:
      - ref: "PMID:9185542"
        method: "EM + IHC"
        scope: "adult mouse SVZ/RMS"
        quote_key: "625292_d93a2b77"
      - ref: "PMID:26880934"
        method: "review (neural stem cell niche)"
        scope: "adult RMS/OB"
        quote_key: "25925289_3e8b7d21"
      - ref: "PMID:37488837"
        method: "review (adult neurogenesis)"
        scope: "adult RMS/OB"
        quote_key: "10712122_b12c9e55"
    electrophysiology_class: >
      Synaptic integration occurs around 21 days after neuroblast generation;
      at 10 days immature neurons are not yet synaptically integrated.
      Differentiated interneurons provide lateral inhibition: periglomerular
      neurons inhibit between individual glomeruli, while granule cells
      provide lateral inhibition between mitral and tufted cells.
    ephys_sources:
      - ref: "https://doi.org/10.3389/fnins.2015.00110"
        method: "fate-mapping (TAM)"
        scope: "adult olfactory bulb granule cells"
        quote_key: "13752593_e66a0d99"
    location_sources:
      - ref: "PMID:9185542"
        method: "EM + IHC"
        scope: "adult mouse SVZ/RMS"
        quote_key: "625292_d93a2b77"
      - ref: "PMID:26880934"
        method: "review (neural stem cell niche)"
        scope: "adult SVZ/RMS/OB"
        quote_key: "25925289_3e8b7d21"
    colocated_types:
      - neighboring_type: "Type B1/B2 astrocytes (SVZ)"
        spatial_relationship: "ADJACENT"
        notes: "Ensheathing niche cells around Type A neuroblast chains (PMID:9185542, quote_key=625292_d93a2b77)."
      - neighboring_type: "Type C cells (transit-amplifying progenitors)"
        spatial_relationship: "ADJACENT"
        notes: "Lineage precursor clusters in SVZ, closely associated with Type A chains (PMID:9185542, quote_key=625292_d93a2b77)."
      - neighboring_type: "mitral and tufted cells (OB)"
        spatial_relationship: "DISTAL"
        notes: "Inhibitory targets after maturation into granule/periglomerular interneurons (quote_key=2281064_e87c4b99)."
    cl_mapping:
      cl_term:
        id: CL:0000031
        label: "neuroblast (sensu Vertebrata)"
        name_in_source: "type A neuroblast"
      mapping_type: BROAD
      mapping_notes: >
        CL:0000031 covers SVZ-born type A migrating neuroblasts
        (PSA-NCAM+/TuJ1+/DCX+, GFAP-) en route to the olfactory bulb via the
        rostral migratory stream. CL:1000042 (forebrain neuroblast) is a
        more specific BROAD subclass. Terminal fate terms CL:0000626
        (olfactory granule cell) and CL:1001435 (periglomerular cell) do
        not match the migrating/immature stage.
    definition_references:
      - "PMID:9185542"
      - "PMID:26880934"
      - "PMID:37488837"
      - "PMID:23667508"
    is_terminal: false
    notes: >
      HETEROGENEITY: The proposed type spans a maturation trajectory
      (SVZ type A neuroblasts → RMS migrating cells → immature OB
      interneurons) and splits into two terminal mature fates (granule
      and periglomerular cells). These may warrant separate sub-nodes.
      No dedicated UBERON term for rostral migratory stream or SVZ
      lineage-specific structures; UBERON:0002264 (subventricular zone)
      used as closest container for SVZ/RMS, with the olfactory bulb as
      the terminal target.

  # ── Striatum Immature Neuron (SVZ-derived) ──────────────────────

  - id: str_immature_neuron
    name: "Striatum Immature Neuron (SVZ-derived)"
    definition_basis: CLASSICAL_NEUROCHEMICAL
    species: null  # To be confirmed — studies cite mouse, rat
    anatomical_location:
      - id: UBERON:0002435
        label: "striatum"
        name_in_source: "striatum (SVZ-derived)"
    nt_type:
