        notes: "Source of primary glutamatergic afferents (PMID:26056581, quote_key=245432259_7c3e9a44)."
      - neighboring_type: "hippocampal inhibitory interneurons (CA3)"
        spatial_relationship: "DISTAL"
        notes: "Target of mossy fiber collaterals to inhibitory interneurons (PMID:26056581, quote_key=245432259_7c3e9a44)."
    cl_mapping:
      cl_term:
        id: CL:2000089
        label: "dentate gyrus granule cell"
        name_in_source: "dentate granule cell"
      mapping_type: EXACT
      mapping_notes: >
        CL:2000089 is an EXACT match for the terminally-differentiated
        mature dentate gyrus granule neuron (stage 6: Calbindin+/NeuN+,
        DCX-negative). Mapping confidence: HIGH. The term's definition
        references PMID:17765709.
    definition_references:
      - "PMID:17765709"
      - "PMID:40519263"
      - "PMID:26056581"
      - "PMID:19482889"
      - "PMID:18385329"
    is_terminal: false
    notes: >
      Terminal differentiation endpoint of the adult DG neurogenesis lineage
      from a developmental perspective (stage 6). is_terminal=false in the
      evidence-graph sense because this is a classical cell type — not an
      atlas cell set with a CCN cell_set_accession. Serves as the mature
      counterpart to dg_immature_granule_neuron (stage 5) and dg_neuroblast
      (type-3). Included in this graph to provide lineage context and an
      anchor for maturation-edge assertions in future edge-population rounds.

