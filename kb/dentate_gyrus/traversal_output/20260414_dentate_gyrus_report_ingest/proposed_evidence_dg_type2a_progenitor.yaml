# --- Evidence item 7 ---
# Target field: defining_markers
# Source: europepmc_fulltext | CorpusId:8479504
- evidence_type: LITERATURE
  reference: "PMID:26056581"
  snippet: "These largely quiescent, GFAP + Nestin + Dcx- stem-like cells (called B-type) intercalate into the ependymal layer as they divide. These divisions produce a highly proliferative GFAP-Nestin + Dcx + progenitor cell (called C-type); this progenitor in turn yields two or more lineage-restricted, transit-amplifying, neuronal precursors (called A-type)."
  support: PARTIAL
  study_type: review

