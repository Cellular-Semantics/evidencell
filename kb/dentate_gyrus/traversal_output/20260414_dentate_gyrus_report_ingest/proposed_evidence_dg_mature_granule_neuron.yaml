# --- Evidence item 11 ---
# Target field: defining_markers
# Source: europepmc_fulltext | CorpusId:15994456
- evidence_type: LITERATURE
  reference: "PMID:15684031"
  snippet: "Calbindin (CB) and calretinin (CR) immunoreactivity were each observed in 4–5-wk-old and 11–12-wk-old BrdU+ cells. In triple-labeled sections, no BrdU+/CR+ cells appeared to be CB+, suggesting that there are two distinct classes of newly generated cortical interneurons or, alternatively, that new interneurons make a developmental switch from CR to CB expression like the adult-born dentate gyrus granule neurons."
  support: SUPPORT
  study_type: primary

