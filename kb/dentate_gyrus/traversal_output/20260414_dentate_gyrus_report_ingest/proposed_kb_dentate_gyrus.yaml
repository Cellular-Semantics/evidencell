            quote_key: "15727849_1c5c63e5"
            marker_type: PROTEIN
    negative_markers:
      - symbol: DCX
        ncbi_gene_id: null
      - symbol: Nestin
        ncbi_gene_id: null
      - symbol: PSA-NCAM
        ncbi_gene_id: null
    neuropeptides: []
    morphology_notes: >
      Terminally differentiated granule neurons (stage 6) populating the granule
      cell layer. Fully elaborated dendritic arbor and complete axonal projections
      to CA3. Receive primary glutamatergic afferents from entorhinal cortex and
      project mossy fiber axons to inhibitory interneurons and pyramidal cells
      of area CA3.
    morphology_sources:
      - ref: "PMID:26056581"
        method: "review (adult neurogenesis)"
        scope: "adult dentate gyrus"
        quote_key: "8479504_1542ed61"
      - ref: "PMID:16399667"
        method: "retrovirus-mediated gene transduction + confocal"
        scope: "adult mouse dentate gyrus"
        quote_key: "18166210_b155d498"
    electrophysiology_class: >
      Fully synaptically integrated; functionally mature with established
      input from entorhinal cortex and output to CA3.
    ephys_sources: []
    location_sources:
      - ref: "PMID:31068541"
        method: "review (hippocampal neurogenesis)"
        scope: "adult rat dentate gyrus"
        quote_key: "148569364_4e97a8b8"
    cl_mapping:
      cl_term:
        id: CL:2000089
        label: "dentate gyrus granule cell"
        name_in_source: "dentate gyrus granule cell"
      mapping_type: EXACT
      mapping_notes: >
        CL:2000089 (dentate gyrus granule cell) is an exact match — defined as
        a granule cell with soma in the dentate gyrus cell layer, with
        characteristic cone-shaped tree of spiny apical dendrites projecting
        to CA3. PMID:17765709 is cited in the CL definition.
    definition_references:
      - "PMID:40519263"
      - "PMID:26056581"
      - "PMID:16399667"
      - "PMID:31068541"
      - "PMID:19482889"
    is_terminal: false
    notes: >
      Terminal differentiation endpoint of the adult neurogenesis lineage in
      the dentate gyrus. Tis21 expression decreases in mature granule cells
      compared to the maturing stage (Attardo et al. 2009). No subtypes
      discussed in this report.


