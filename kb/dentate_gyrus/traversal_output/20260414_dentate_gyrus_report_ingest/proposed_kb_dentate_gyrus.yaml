          scope: "adult dentate gyrus"
          quote_key: "8479504_1542ed61"
        - ref: "PMID:25954142"
          method: "review (neurogenesis)"
          scope: "adult dentate gyrus"
          quote_key: "625292_ff3f8b1d"
    defining_markers:
      - symbol: DCX
        ncbi_gene_id: null
        sources:
          - ref: "PMID:40519263"
            method: "review (marker classification)"
            scope: "adult dentate gyrus"
            quote_key: "279046466_998847af"
            marker_type: PROTEIN
          - ref: "PMID:37082558"
            method: "review (marker classification)"
            scope: "adult hippocampal DG"
            quote_key: "245432259_44d5c91b"
            marker_type: PROTEIN
      - symbol: NeuN
        ncbi_gene_id: null
        sources:
          - ref: "PMID:40519263"
            method: "review (marker classification)"
            scope: "adult dentate gyrus — stage 5"
            quote_key: "279046466_998847af"
            marker_type: PROTEIN
          - ref: "PMID:37082558"
            method: "review (marker classification)"
            scope: "adult hippocampal DG"
            quote_key: "245432259_44d5c91b"
            marker_type: PROTEIN
      - symbol: PSA-NCAM
        ncbi_gene_id: null
        sources:
          - ref: "PMID:37082558"
            method: "review (marker classification)"
            scope: "adult hippocampal DG"
            quote_key: "245432259_44d5c91b"
            marker_type: PROTEIN
      - symbol: Tis21
        ncbi_gene_id: null
        sources:
          - ref: "PMID:19482889"
            method: "Tis21 knock-in GFP mouse + IHC"
            scope: "adult mouse hippocampus"
            quote_key: "7393550_b2644450"
            marker_type: PROTEIN
    negative_markers:
      - symbol: Calbindin
        ncbi_gene_id: null
    neuropeptides: []
    morphology_notes: >
      Postmitotic neurons (stage 5) that have migrated from SGZ into the inner
      granule cell layer. Axonal projections reach the CA3 area by 10-11 days,
      with first spines forming at 15-16 days. Peak spine growth occurs during
      the first 3-4 weeks, but further structural modifications continue for
      months. They receive glutamatergic afferents from entorhinal cortex and
      project axons to inhibitory interneurons and pyramidal cells of area CA3.
    morphology_sources:
      - ref: "PMID:16399667"
        method: "retrovirus-mediated gene transduction + confocal"
        scope: "adult mouse dentate gyrus"
        quote_key: "18166210_b155d498"
      - ref: "PMID:26056581"
        method: "review (adult neurogenesis)"
        scope: "adult dentate gyrus"
        quote_key: "8479504_1542ed61"
    electrophysiology_class: >
      Synaptically integrating; receive glutamatergic input from entorhinal
      cortex. Full synaptic integration extends over weeks to months.
    ephys_sources: []
    location_sources:
      - ref: "PMID:28168008"
        method: "review (neurogenesis)"
        scope: "adult hippocampal SGZ/GCL"
        quote_key: "13752593_f176b6ad"
      - ref: "PMID:26880934"
        method: "review (neural stem cell niche)"
        scope: "adult hippocampus"
        quote_key: "14221248_1d8cf16a"
    cl_mapping: null
    definition_references:
      - "PMID:40519263"
      - "PMID:37082558"
      - "PMID:16399667"
      - "PMID:19482889"
      - "PMID:26056581"
    is_terminal: false
    notes: >
      No CL term currently exists for a postmitotic, synaptically integrating
      immature granule neuron of the dentate gyrus. CL:4042028 'immature neuron'
      is definitionally incompatible — it explicitly excludes neurogenesis-derived
      neurons. Potential CL contribution: 'immature dentate gyrus granule neuron'
      as child of CL:2000089. Tis21 expression reappears during this maturation
      phase (Attardo et al. 2009), potentially related to functional integration.

