name: "Dentate Gyrus Immature Neuron Lineage"
description: >
  Evidence graph for the adult neurogenesis lineage in the dentate gyrus,
  from neuroblast (type-3 progenitor) through immature granule neuron to
  terminally differentiated mature granule neuron. Classical cell types
  defined by marker expression and maturational stage.

brain_region:
  id: UBERON:0001885
  label: "dentate gyrus of hippocampal formation"
  name_in_source: "dentate gyrus"

target_atlas: null

species: null  # Multiple species referenced (mouse, rat, human) — to be confirmed from primary literature

creation_date: "2026-04-14"


# ══════════════════════════════════════════════════════════════════
# NODES
# ══════════════════════════════════════════════════════════════════

nodes:

  # ── Neuroblast (Type-3 Progenitor) ────────────────────────────

  - id: dg_neuroblast
    name: "Dentate Gyrus Neuroblast (Type-3 Progenitor)"
    definition_basis: CLASSICAL_NEUROCHEMICAL
    species: null  # To be confirmed — studies cite mouse and rat
    anatomical_location:
      - id: UBERON:0004023
        label: "ganglionic eminence"
        name_in_source: "subgranular zone (SGZ)"
        sources:
          - ref: "PMID:28168008"
            method: "review (neurogenesis)"
            scope: "adult hippocampal SGZ"
            quote_key: "13752593_f176b6ad"
          - ref: "PMID:18385329"
            method: "Tbr2-GFP transgene + IHC"
            scope: "adult mouse hippocampus"
            quote_key: "15727849_1c5c63e5"
    nt_type:
      name_in_source: "glutamatergic (committed but not yet functional)"
      cl_terms: []
    defining_markers:
      - symbol: DCX
        ncbi_gene_id: null
        sources:
          - ref: "PMID:40519263"
            method: "review (marker classification)"
            scope: "adult dentate gyrus"
            quote_key: "279046466_998847af"
            marker_type: PROTEIN
          - ref: "PMID:37082558"
            method: "review (marker classification)"
            scope: "adult hippocampal DG"
            quote_key: "245432259_44d5c91b"
            marker_type: PROTEIN
      - symbol: Ki67
        ncbi_gene_id: null
        sources:
          - ref: "PMID:37082558"
            method: "review (marker classification)"
            scope: "adult hippocampal DG"
            quote_key: "245432259_44d5c91b"
            marker_type: PROTEIN
      - symbol: PSA-NCAM
        ncbi_gene_id: null
        sources: []
      - symbol: Nestin
        modifier: "type-2b stage only"
        ncbi_gene_id: null
        sources:
          - ref: "PMID:40519263"
            method: "review (marker classification)"
            scope: "adult dentate gyrus"
            quote_key: "279046466_998847af"
            marker_type: PROTEIN
    negative_markers:
      - symbol: NeuN
        ncbi_gene_id: null
      - symbol: Calbindin
        ncbi_gene_id: null
      - symbol: GFAP
        ncbi_gene_id: null
    neuropeptides: []
    morphology_notes: >
      Migratory precursor cells in the SGZ; migrate only a few micrometers
      from SGZ toward the inner granule cell layer. At the type-2b stage they
      co-express Nestin and DCX; at the type-3 stage they are DCX+ only.
      They are proliferative (Ki67+) and represent the last mitotic stage
      before postmitotic differentiation.
    morphology_sources:
      - ref: "PMID:28168008"
        method: "review (neurogenesis)"
        scope: "adult hippocampal SGZ"
        quote_key: "13752593_f176b6ad"
      - ref: "https://doi.org/10.5772/29754"
        method: "review (neural stem cells)"
        scope: "adult dentate gyrus"
        quote_key: "10712122_246bd5c1"
    electrophysiology_class: >
      Not synaptically integrated; precursor electrophysiological properties
      not characterized in detail in this report.
    ephys_sources: []
    cl_mapping:
      cl_term:
        id: CL:1000042
        label: "forebrain neuroblast"
        name_in_source: "neuroblast"
      mapping_type: BROAD
      mapping_notes: >
        CL:1000042 (forebrain neuroblast) is the closest CL ancestor but too
        broad — it encompasses all forebrain neuroblasts without distinguishing
        the SGZ transit-amplifying progenitor stages (type-2a/b/3). No
        dentate gyrus-specific neuroblast term exists in CL.
    definition_references:
      - "PMID:40519263"
      - "PMID:37082558"
      - "PMID:18385329"
      - "PMID:19482889"
      - "PMID:28168008"
    is_terminal: false
    notes: >
      The developmental sequence distinguishes type-2a (Nestin+/Sox2+),
      type-2b (Nestin+/DCX+), and type-3 (DCX+) stages. A transcription
      factor cascade (Pax6 > Ngn2 > Tbr2 > NeuroD > Tbr1) marks stage
      transitions (Hodge et al. 2008). Potential HETEROGENEITY: the three
      transit-amplifying stages may warrant separate nodes.

