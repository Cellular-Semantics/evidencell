# --- Evidence item 2 ---
# Target field: defining_markers
# Source: asta_report — pending primary verification | section: Introduction | CorpusId:279046466
- evidence_type: LITERATURE
  reference: "CorpusId:279046466"
  snippet: "Neural stem cells (NSCs) progressively develop into proliferating neural progenitor cells (NPCs), designated as type-2a (Nestin+/Sox2+), type-2b cells (expressing Nestin and doublecortin: Nestin+/DCX+) and neuroblasts (type-3, DCX+). Neuroblasts progress toward immature postmitotic granule neurons co-expressing DCX and NeuN (stage 5), and eventually become terminally differentiated neurons (stage 6) expressing calbindin and NeuN."
  support: SUPPORT
  study_type: review

