# --- Evidence item 5 ---
# Target field: defining_markers
# Source: asta_report — pending primary verification | section: INTRODUCTION | CorpusId:245432259
- evidence_type: LITERATURE
  reference: "CorpusId:245432259"
  snippet: "Three types of proliferatively active cells have been identified in the granular layer of the dentate gyrus (DG) of the hippocampus: type I cells – radial glial-like stem cells expressing glial fibrillary acidic protein (GFAP) and Sox2; type II cells – non-sessile cells expressing nestin, also referred to as transiently activated progenitor cells, neuroblasts expressing doublecortin (DCX); and Ki67 proteins and immature neurons expressing the DCX protein, PSA-NCAM, a marker of migrating neurons (polysialylated neuronal cell adhesion molecules) and neuron-specific protein (NeuN)."
  support: PARTIAL
  study_type: review

# --- Evidence item 6 ---
# Target field: electrophysiology_class
# Source: asta_report — pending primary verification | section: Hippocampus | CorpusId:258927570
- evidence_type: LITERATURE
  reference: "CorpusId:258927570"
  snippet: "NSCs in the hippocampus give rise to GCs through a regulated process that includes emergence from a quiescence state, posterior divisions, specification to a neuronal fate, neuronal differentiation, and physiological integration in the pre-existing hippocampal circuits. Synapses, intrinsic electrical characteristics, and neuronal morphology all develop concurrently throughout this time toward a fully developed neuronal phenotype."
  support: PARTIAL
  study_type: review

