##
# Cerebellar Purkinje Layer Interneurons — WMBv1 mapping
#
# Brain region: Cerebellar cortex (Purkinje layer interneurons)
# Target atlas: WMBv1 (Yao et al. 2023, Nature 624:317-332)
# Curation date: 2026-02-25
# Curator: dosumis
# Source analysis: https://github.com/Cellular-Semantics/cellular_semantics_notebooks/tree/main/MLI-PLI%20annotation
#
# Evidence graph (current):
#
#   classical_candelabrum ──[EQUIVALENT, Osorno 2022]──► pli1_osorno
#   classical_globular    ──[EQUIVALENT, Osorno 2022]──► pli2_osorno
#   classical_lugaro      ──[EQUIVALENT, Osorno 2022]──► pli3_osorno
#                                                            │
#   pli1_osorno ──[EQUIVALENT, F1≈0.94, MapMyCells]────► wmb_cluster_5178   (terminal)
#   pli2_osorno ──[PARTIAL_OVERLAP, F1≈0.87, MapMyCells]► wmb_cluster_5177  (terminal)
#   pli3_osorno ──[EQUIVALENT, F1≈0.96, MapMyCells]────► wmb_supertype_1145 (terminal)
#
# Cross-Allen-taxonomy transfer (future / illustrative):
# If a BICAN or other Allen taxonomy with CCN accessions existed for cerebellum,
# a direct cross-atlas edge could be added, e.g.:
#
#   wmb_supertype_1145 ──[EQUIVALENT, cross-atlas MapMyCells]──► bican_cb_cluster_X  (terminal)
#   (source_cell_set_accession: CS20230722_SUPT_1145,
#    target_cell_set_accession: CS20250101_CLUS_XXXX)
##

name: "Cerebellar Purkinje Layer Interneurons — WMBv1"
description: >
  Evidence graph mapping classically defined Purkinje layer interneuron (PLI) types
  — Candelabrum, Globular, and Lugaro cells — to cell sets in the WMBv1 atlas.
  Mapping was performed by annotation transfer of transcriptomic data from
  Osorno et al. 2022 (SCP795) to WMBv1 using MapMyCells.

brain_region:
  id: MBA:1145
  label: "Cerebellar cortex, Purkinje layer"
  name_in_source: "Cerebellar cortex, Purkinje layer"

target_atlas: WMBv1

species:
  id: NCBITaxon:10090
  label: Mus musculus
  name_in_source: "Mus musculus"

creation_date: "2026-02-25"


# ══════════════════════════════════════════════════════════════════
# NODES
# ══════════════════════════════════════════════════════════════════

nodes:

  # ── Classical types ────────────────────────────────────────────

  - id: classical_candelabrum
    name: "Candelabrum cell"
    definition_basis: CLASSICAL_MORPHOLOGICAL
    species: {id: NCBITaxon:10090, label: "Mus musculus", name_in_source: "Mus musculus"}
    anatomical_location:
      - id: MBA:1145
        label: "Cerebellar cortex, Purkinje layer"
        name_in_source: "Cerebellar cortex, Purkinje layer"
    cl_mapping:
      cl_term: {id: CL:4042030, label: candelabrum cell, name_in_source: "candelabrum cell"}
      mapping_type: EXACT
      mapping_notes: >
        CL:4042030 (candelabrum cell) was created based on Osorno et al. 2022 and
        describes exactly this type. The CL definition notes "A GABAergic interneuron
        located in the Purkinje layer of the cerebellar cortex... beaded axons that
        make local synapses contacts within the molecular layer."
    nt_type:
      name_in_source: "GABA"
      cl_terms:
        - id: CL:0000617
          label: GABAergic neuron
          name_in_source: "GABA"
    defining_markers:
      # smFISH-validated on tissue-localised cells matching CC morphology and
      # distribution (Osorno 2022, Fig 3). Bridge: Oxtr-Cre×Ai14 labels
      # morphologically confirmed CCs; smFISH PLI1 profile co-localises with
      # these cells in the PCL. These are therefore independently confirmed
      # on the classical type, not just inferred from the snRNA-seq cluster.
      - symbol: Nxph1
        sources:
          - marker_type: TRANSCRIPT
            method: "smFISH on cerebellar tissue (Fig 3A-E)"
            scope: "adult mouse cerebellar cortex, PCL cells matching CC distribution"
            snippet: "PLI1s (Nxph1+, Aldh1a3+, Slc6a5−); smFISH-identified PLI1s match distribution of morphologically confirmed tdTomato+ CCs in Oxtr-Cre×Ai14 mice"
            ref: "PMID:35578131"
      - symbol: Aldh1a3
        sources:
          - marker_type: TRANSCRIPT
            method: "smFISH on cerebellar tissue (Fig 3A-E)"
            scope: "adult mouse cerebellar cortex, PCL cells matching CC distribution"
            snippet: "PLI1s (Nxph1+, Aldh1a3+, Slc6a5−); smFISH-identified PLI1s match distribution of morphologically confirmed tdTomato+ CCs in Oxtr-Cre×Ai14 mice"
            ref: "PMID:35578131"
    negative_markers:
      - symbol: Slc6a5
        sources:
          - marker_type: TRANSCRIPT
            method: "smFISH on cerebellar tissue (Fig 3A-E)"
            scope: "adult mouse cerebellar cortex, PLI1 vs PLI2/PLI3"
            snippet: "PLI1s (Nxph1+, Aldh1a3+, Slc6a5−); Slc6a5 distinguishes PLI1/CC from PLI2/Globular and PLI3/Lugaro"
            ref: "PMID:35578131"
    morphology_notes: >
      Small soma (~10 μm diameter) in the Purkinje cell layer. 1–2 primary
      dendrites ascend to the pia and branch in the upper molecular layer;
      secondary dendrites extend to the upper granular layer. Dendrites
      confined to a parasagittal plane. Beaded axon emanates near soma,
      branches and extends in the molecular layer; 92% of synapses onto MLIs
      (preferentially MLI1s; Lackey et al. 2024, Osorno et al. 2022).
      Expresses high levels of Nrp1 (neuropilin-1), yet unlike basket cells
      does not target PC axon initial segments — targets MLIs instead
      (Schilling 2023, citing Telley et al. 2016 re Nrp1/Sema3a mechanism).
      Most abundant PLI (approximately 80% as many as Golgi1 cells). Present
      in all cerebellar lobules. Originally described by Lainé & Axelrad 1994
      (PMID:8300903); comprehensively characterised by Osorno et al. 2022.
    electrophysiology_class: >
      Extremely high input resistance; mostly silent with occasional low-frequency
      spontaneous firing. Highly sensitive to current injection relative to MLI
      subtypes. Excited by mossy fibres (monosynaptic, ~1.45 ms latency) and
      granule cell parallel fibres (facilitating). Strongly inhibited by Purkinje
      cells (~42% of spontaneous IPSCs). Single CC firing at ~60 spikes/s reduces
      IPSC charge in nearby PCs by ~24% (disinhibition via MLI1 inhibition).
      PC collaterals preferentially target MLI2s; CCs preferentially inhibit
      MLI1s — together with PC-PC synapses these form a negative feedback
      loop (Lackey et al. 2024).
    definition_references:
      - "PMID:8300903"
      - "PMID:35578131"
      - "PMID:34616064"
      - "PMID:37940705"  # Schilling 2023 — review confirming PLI classification
      # Lackey et al. 2024 (CorpusId:280548075) — CC→MLI1 circuit refinement
    is_terminal: false
    proposed_cl_term:
      cl_id: CL:4042030
      label: candelabrum cell
      definition: >
        A GABAergic interneuron of the cerebellar cortex Purkinje layer with an
        ascending axon collateral projecting into the molecular layer.
        Reference transcriptomic data for this type can be found in WMBv1 in
        cell set CS20230722_CLUS_5178.
      status: ACCEPTED

  - id: classical_globular
    name: "Globular cell"
    definition_basis: CLASSICAL_MORPHOLOGICAL
    species: {id: NCBITaxon:10090, label: "Mus musculus", name_in_source: "Mus musculus"}
    anatomical_location:
      - id: MBA:1145
        label: "Cerebellar cortex, Purkinje layer"
        name_in_source: "Cerebellar cortex, Purkinje layer"
    cl_mapping:
      cl_term: {id: CL:4072102, label: Purkinje layer interneuron, name_in_source: "Purkinje layer interneuron"}
      mapping_type: BROAD
      mapping_notes: >
        No specific CL term yet for Globular cell. CL:4072102 (Purkinje layer interneuron)
        is the appropriate broad ancestor — this is also the direct parent of CL:4042030
        (candelabrum cell) and CL:0011006 (Lugaro cell). A new term for Globular cell
        would be placed as a sibling of candelabrum cell within this parent.
    nt_type:
      name_in_source: "GABA-Glyc"
      cl_terms:
        - id: CL:0000617
          label: GABAergic neuron
          name_in_source: "GABA"
        - id: CL:0000084
          label: glycinergic neuron
          name_in_source: "Glyc"
          # Note: CL:0000084 glycinergic neuron — verify ID in current CL release.
    morphology_notes: >
      Globular soma in Purkinje layer. Distinct morphology from Lugaro and Candelabrum.
      Defined by Osorno et al. 2022.
    is_terminal: false
    proposed_cl_term:
      definition: >
        A GABAergic/glycinergic interneuron of the cerebellar cortex Purkinje layer
        with a globular soma morphology, distinct from Lugaro and Candelabrum cells.
        Reference transcriptomic data for this type can be found in WMBv1 in
        cell set CS20230722_CLUS_5177 (best mapping) and neighbouring PLI clusters.
      parent_cl_term: {id: CL:4072102, label: Purkinje layer interneuron, name_in_source: "Purkinje layer interneuron"}
      status: DRAFT

  - id: classical_lugaro
    name: "Lugaro cell"
    definition_basis: CLASSICAL_MORPHOLOGICAL
    species: {id: NCBITaxon:10090, label: "Mus musculus", name_in_source: "Mus musculus"}
    anatomical_location:
      - id: MBA:1145
        label: "Cerebellar cortex, Purkinje layer"
        name_in_source: "Cerebellar cortex, Purkinje layer / granule layer border"
    cl_mapping:
      cl_term: {id: CL:0011006, label: Lugaro cell, name_in_source: "Lugaro cell"}
      mapping_type: EXACT
      mapping_notes: >
        CL:0011006 (Lugaro cell) is the exact CL term for this type. The CL definition
        describes "a spindle-shaped or triangular soma, parasagittally oriented and
        located at the border between the granular layer and the Purkinje cell layer...
        capable of co-releasing GABA and glycine." This matches the classical description.
    nt_type:
      name_in_source: "GABA-Glyc"
      cl_terms:
        - id: CL:0000617
          label: GABAergic neuron
          name_in_source: "GABA"
        - id: CL:0000084
          label: glycinergic neuron
          name_in_source: "Glyc"
          # Note: CL:0000084 glycinergic neuron — verify ID in current CL release.
    morphology_notes: >
      Large soma below Purkinje cell layer, long horizontal axon extending across
      the granule cell layer. Historically named after Luigi Lugaro. Known to
      be activated by serotonin. Co-transmits GABA and glycine.
    is_terminal: false
    proposed_cl_term:
      cl_id: CL:0011006
      label: Lugaro cell
      definition: >
        A cerebellar interneuron characterized by a spindle-shaped or triangular soma,
        parasagittally oriented and located at the border between the granular layer
        and the Purkinje cell layer. The Lugaro cell extends dendrites predominantly
        in the parasagittal plane, forming synaptic interactions with basket, stellate,
        and Golgi cells. Its axonal projections extend upward into the molecular layer,
        where they form a parasagittal plexus and emit long transverse collaterals that
        run parallel to the long axis of the cerebellar folia. The Lugaro cell is
        capable of co-releasing GABA and glycine, as evidenced by the expression of
        glutamate decarboxylase (GAD65/67) and the glycine transporter GlyT2.
      comment: >
        Mapping to Lugaro cell is based on annotation transfer of PLI3 transcriptomic
        data (Osorno et al. 2022, PMID:35578131, SCP795) to WMBv1 using MapMyCells,
        yielding group_purity=0.94 and target_purity=0.98 at supertype level (1145 CB
        PLI Gly-Gaba_2). Lugaro cells co-transmit GABA and glycine (consistent with
        the GABA-Glyc NT prediction of supertype 1145). Best mapping is at supertype
        rather than cluster level; individual clusters within supertype 1145 may reflect
        further heterogeneity not yet characterised.
      xrefs:
        - PMID:35578131
        - https://doi.org/10.1038/s41586-023-06812-z
        - CS20230722_SUPT_1145
        - https://github.com/Cellular-Semantics/cellular_semantics_notebooks/tree/main/MLI-PLI%20annotation
      status: ACCEPTED

