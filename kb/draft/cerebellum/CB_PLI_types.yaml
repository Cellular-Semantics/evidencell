# ══════════════════════════════════════════════════════════════════
# EDGES
# ══════════════════════════════════════════════════════════════════

edges:

  # ── Step 1: Classical → Prior T-type (Osorno 2022) ─────────────

  - id: edge_candelabrum_to_pli1
    type_a: classical_candelabrum
    type_b: pli1_osorno
    relationship: EQUIVALENT
    confidence: HIGH
    evidence:
      - evidence_type: LITERATURE
        supports: SUPPORT
        reference: "PMID:35578131"
        snippet: >
          "The combination of the tdTomato+ labelling of PLIs in Oxtr-Cre × Ai14
          mice, fluorescent labelling and 2P imaging of these cells, and in situ
          labelling of 3 genes...establishes that tdTomato+ PLIs are CCs that
          correspond to PLI1s."
        explanation: >
          Osorno 2022 establishes PLI1 = Candelabrum cell via three converging lines
          of evidence: (1) Oxtr-Cre×Ai14 transgenic labels cells with confirmed CC
          morphology (small soma ~10 μm in PCL, dendrites to pia, beaded axon in ML;
          Fig 1, 2-photon fill with Alexa-594). (2) snRNA-seq identifies PLI1 as
          Nxph1+/Aldh1a3+/Slc6a5−, distinct from PLI2 (Globular) and PLI3 (Lugaro)
          which both express Slc6a5. (3) smFISH on tissue (Fig 3) confirms PLI1
          molecular profile co-localises with tdTomato+ CC distribution in the PCL.
          PLI2 and PLI3 are excluded by morphology (different soma shape/location)
          and by Slc6a5 expression. Additional molecular validation: Grin1/Grin2b
          expression in PLI1 confirmed by NMDA receptor currents in electrophysiology
          on Oxtr-Cre-labelled CCs (Fig 4).
        study_type: MULTIMODAL
      - evidence_type: LITERATURE
        supports: SUPPORT
        reference: "PMID:37940705"
        snippet: >
          "PLI1 cells correspond to candelabrum cells, PLI2 cells represent
          globular cells, and PLI3 cells are Lugaro cells."
        explanation: >
          Schilling 2023 review independently confirms PLI1=CC correspondence,
          citing both Kozareva 2021 and Osorno 2022. Also notes CCs are "purely
          GABAergic (i.e., not using glycine as a (co-) transmitter)" (citing
          Simat 2007), and raises Nrp1 expression as an open developmental
          question distinguishing CC axon targeting from basket cell targeting.
        study_type: REVIEW

  - id: edge_globular_to_pli2
    type_a: classical_globular
    type_b: pli2_osorno
    relationship: EQUIVALENT
    confidence: MODERATE
    evidence:
      - evidence_type: LITERATURE
        supports: SUPPORT
        reference: "PMID:35578131"
        snippet: >
          "PLI2s also express Slc6a5, which suggests that they correspond to
          globular cells that are glycinergic, are located near or below the
          PCL and are inhibited by PCs."
        explanation: >
          Osorno 2022 defines PLI2 as globular cells based on soma morphology,
          providing the primary classical-to-T-type correspondence.
        study_type: MULTIMODAL
    unresolved_questions:
      - >
        The Globular cell type has limited prior classical characterisation compared
        to Lugaro and Candelabrum. The PLI2 definition is largely Osorno 2022's
        own contribution — prior classical literature may not have this type
        explicitly named.

  - id: edge_lugaro_to_pli3
    type_a: classical_lugaro
    type_b: pli3_osorno
    relationship: EQUIVALENT
    confidence: HIGH
    evidence:
      - evidence_type: LITERATURE
        supports: SUPPORT
        reference: "PMID:35578131"
        snippet: >
          "The expression of Htr2a, which encodes the serotonin 2A (5-HT2A)
          receptor, and Slc6a5, which encodes the glycine transporter, by PLI3
          suggests that this cell type corresponds to Lugaro cells."
        explanation: >
          Osorno 2022 directly maps PLI3 to the classical Lugaro cell type based on
          soma location, axon morphology, and co-transmission of GABA + glycine.
          The correspondence is supported by multiple independent features.
        study_type: MULTIMODAL

  # ── Step 2: Prior T-type → WMBv1 (MapMyCells annotation transfer) ─

  - id: edge_pli1_to_wmb5178
    type_a: pli1_osorno
    type_b: wmb_cluster_5178
    relationship: EQUIVALENT
    confidence: HIGH
    evidence:
      - evidence_type: ANNOTATION_TRANSFER
        supports: SUPPORT
        explanation: >
          MapMyCells annotation transfer of PLI1 cells (Osorno SCP795) to WMBv1.
          Near one-to-one correspondence with cluster 5178 (GABA), with high
          group and target purity. NT prediction (GABA) is consistent with
          classical Candelabrum NT type.
        source_dataset_accession: "SCP:SCP795"
        source_cluster_label: PLI1
