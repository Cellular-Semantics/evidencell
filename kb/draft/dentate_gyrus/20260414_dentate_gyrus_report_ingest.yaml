  morphology_notes: 'Terminally differentiated granule neurons (stage 6) populating the granule cell layer. Fully elaborated
    dendritic arbor and complete axonal projections to CA3. Receive primary glutamatergic afferents from entorhinal cortex
    and project mossy fiber axons to inhibitory interneurons and pyramidal cells of area CA3.

    '
  morphology_sources:
  - ref: PMID:26056581
    method: review (adult neurogenesis)
    scope: adult dentate gyrus
    quote_key: 8479504_1542ed61
  - ref: PMID:16399667
    method: retrovirus-mediated gene transduction + confocal
    scope: adult mouse dentate gyrus
    quote_key: 18166210_b155d498
  electrophysiology_class: 'Terminally differentiated granule neurons fire repetitive action potentials (plateau ~140 Hz; Vth
    ~-39.6 to -45.8 mV). Membrane capacitance 99.2 pF, time constant 33.7 ms, resting potential -74.8 mV (van Praag et al. 2002;
    adult mouse). Substantially larger Cm and longer tau_m than immature adult-born granule cells (Schmidt-Hieber et al. 2004).
    Fully synaptically integrated by 4 weeks; receive perforant path afferents from entorhinal cortex and project mossy fibers to
    CA3. Primary data from adult mouse (C57BL/6).

    '
  ephys_sources:
  - ref: PMID:11875571
    method: patch-clamp (retroviral GFP newborn DGCs vs mature granule cells)
    scope: adult mouse dentate gyrus
    quote_key: 4403779_5755e11d
