    description: 'TYPE_A_SPLITS: CL:2000089 (mature granule neuron) is split across nine DG Glut clusters (0502-0510) representing
      topographic variants (dorsal/ventral/posterior GCL) and neuropeptide/functional variants. Cluster CS20230722_CLUS_0510
      covers the DG po (posterior GCL) subpopulation. All nine clusters together constitute the full classical type.'
  unresolved_questions:
