  - evidence_type: LITERATURE
    supports: SUPPORT
    explanation: Confirms Tbr1 marks terminally differentiated postmitotic granule cells. DG Glut clusters represent the Tbr1+
      mature stage even though Tbr1 does not appear as a cluster-distinguishing marker.
    reference: PMID:18385329
    snippet: Tbr1 expression was observed only in postmitotic granule cells and was not detected in progenitor cells, because
      Tbr1 never colocalized with nestin-GFP.
    study_type: EXPERIMENTAL
