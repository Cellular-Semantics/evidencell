  morphology_notes: 'Postmitotic neurons (stage 5) migrated from SGZ into the inner granule cell layer. Axonal projections reach
    CA3 at 10-11 dpi, 5-6 days before first spines form (Zhao 2006). Dendrites reach the inner molecular layer at 10 dpi, middle
    molecular layer at ~14 dpi, and outer edge by 21 dpi. Spine density rises from 0.43 to 2.61 spines/um between 21-56 dpi.
    Extends dendrites toward molecular layer and mossy fiber axons through hilus to CA3. Mouse retroviral GFP data.

    '
  morphology_sources:
  - ref: PMID:16399667
    method: retrovirus-mediated GFP labelling + confocal
    scope: adult mouse dentate gyrus
    quote_key: 18166210_3e909cd4
  - ref: PMID:16399667
    method: retrovirus-mediated GFP labelling + confocal
    scope: adult mouse dentate gyrus
    quote_key: 18166210_aa19f3be
  electrophysiology_class: 'Adult-born immature granule neurons follow a stereotyped synaptic maturation sequence: silent (1-7 dpi;
    Vrest -50.6 mV, Rin 4.3 GOhm, Cm 6.4 pF) → slow GABAergic PSCs only (8-18 dpi; EGABA -26.9 to -44.5 mV, depolarising) →
    glutamatergic PSCs acquired (>=14-18 dpi; Vrest -63.2 mV, Cm 24.6 pF) → fast perisomatic GABA last (~4 wk) (Esposito et al.
    2005; Ge et al. 2006). T-type Ca2+ channels confer enhanced LTP inducibility vs. mature granule cells (Schmidt-Hieber et al.
    2004). GABA depolarisation mechanistically required for dendritic arborisation (NKCC1-dependent; Ge et al. 2006). All primary
    data from adult mouse (C57BL/6).

    '
  ephys_sources:
