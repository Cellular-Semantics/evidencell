name: Dentate Gyrus Adult Neurogenesis Lineage
description: 'Evidence graph for the full adult neurogenesis lineage in the dentate gyrus, from type-2a neural progenitor
  through type-2b progenitor, neuroblast (type-3), immature granule neuron, to terminally differentiated mature granule neuron.
  Classical cell types defined by marker expression and maturational stage. CL terms: CL:9900003 (type-2a), CL:9900004 (type-2b),
  CL:9900001 (neuroblast), CL:9900002 (immature GN), CL:2000089 (mature GN).

  '
