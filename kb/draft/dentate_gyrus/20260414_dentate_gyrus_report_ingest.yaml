    node_b_value: not present in defining_markers
    alignment: APPROXIMATE
    notes: Tbr1 marks postmitotic granule cells broadly and is non-discriminating at cluster level. Surrogate TF markers Glis3,
      St18, Lhx9, Nr2f2 serve as the atlas correlates of mature granule identity for this cluster.
  evidence:
  - evidence_type: ATLAS_METADATA
    supports: SUPPORT
    explanation: 'Cluster CS20230722_CLUS_0510 is within the DG Glut subclass (CL:2000089 EXACT mapping). Discovery composite
      score 0.62. Core TF/MERFISH markers: Glis3, St18, Lhx9, Nr2f2. Neuropeptides: Cck, Grp, Pdyn. Soma: DG po (posterior
      GCL) (HIP:0.99). All DG Glut clusters share Glis3/Neurod2/Slc17a7 mature granule core; classical protein markers Calbindin/NeuN/Tbr1
      absent from atlas — protein-transcriptome gap.'
    atlas: Allen Brain Cell Atlas CCN202307220
    cell_set_accession: CS20230722_CLUS_0510
  - evidence_type: LITERATURE
    supports: SUPPORT
    explanation: Establishes stage-6 mature identity as DCX−/NeuN+/Calbindin+. DG Glut clusters collectively represent this
      terminal state; absence of DCX/Eomes and presence of mature TF core (Glis3, Neurod2) distinguishes them from upstream
      neuroblast and immature GN clusters.
    reference: PMID:40519263
    snippet: Neuroblasts progress toward immature postmitotic granule neurons co-expressing DCX and NeuN (stage 5), and eventually
      become terminally differentiated neurons (stage 6) expressing calbindin and NeuN.
