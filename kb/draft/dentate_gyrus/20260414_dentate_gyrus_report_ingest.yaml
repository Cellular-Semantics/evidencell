  notes: 'CL:9900002 was proposed based on this node — the Tbr1+/Prox1+/Igfbpl1+ marker profile from clusters 0514/0515 and
    the classical DCX+/NeuN+ description from PMID:40519263/37082558 together define the term. Tis21 expression reappears
    during this maturation phase (Attardo et al. 2009), potentially related to functional integration.

    '
