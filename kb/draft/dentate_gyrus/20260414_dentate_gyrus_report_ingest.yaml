  morphology_notes: 'Migratory precursor cells in the SGZ; migrate only a few micrometers from SGZ toward the inner granule
    cell layer. At the type-2b stage they co-express Nestin and DCX; at the type-3 stage they are DCX+ only. They are proliferative
    (Ki67+) and represent the last mitotic stage before postmitotic differentiation.

    '
  morphology_sources:
  - ref: PMID:28168008
    method: review (neurogenesis)
    scope: adult hippocampal SGZ
    quote_key: 13752593_f176b6ad
  - ref: https://doi.org/10.5772/29754
    method: review (neural stem cells)
    scope: adult dentate gyrus
    quote_key: 10712122_246bd5c1
  electrophysiology_class: 'Type-2 progenitor cells (neuroblast equivalent) receive direct GABAergic but not glutamatergic synaptic
    inputs; GABA is depolarising due to elevated [Cl-]i driven by high NKCC1 and low KCC2 (Tozuka et al. 2005; Ge et al. 2006).
    Synaptically silent for glutamatergic output. High input resistance (~4.3 GOhm) and small capacitance (~6.4 pF) at 1-7 dpi
    (Esposito et al. 2005). Tonic GABA activation from 3 dpi precedes phasic synaptic inputs (Ge et al. 2006). Mouse patch-clamp data.

    '
  ephys_sources:
  - ref: PMID:16157276
    method: patch-clamp (nestin-GFP targeted type-2 cells, acute hippocampal slice)
    scope: adult mouse dentate gyrus
    quote_key: 3154810_ea1038a9
  - ref: PMID:16341203
    method: patch-clamp (retroviral GFP, DCX+ newborn DGCs)
    scope: adult mouse dentate gyrus
