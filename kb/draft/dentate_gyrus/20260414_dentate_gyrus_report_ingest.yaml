      label: dentate gyrus granule cell
      name_in_source: dentate gyrus granule cell
    mapping_type: EXACT
    mapping_notes: 'CL:2000089 (dentate gyrus granule cell) is an exact match — defined as a granule cell with soma in the
      dentate gyrus cell layer, with characteristic cone-shaped tree of spiny apical dendrites projecting to CA3. PMID:17765709
      is cited in the CL definition.

      '
