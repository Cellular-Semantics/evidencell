      exact match — defined as the Nestin+/Sox2+/ DCX− amplifying progenitor in the SGZ prior to doublecortin expression.
      No atlas cluster confidently resolves this stage; it precedes the earliest DG-PIR Ex IMN clusters (0511–0513) in the
