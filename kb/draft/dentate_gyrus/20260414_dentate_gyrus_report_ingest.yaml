    scope: adult mouse hippocampus
    quote_key: 15727849_1c5c63e5
  cl_mapping:
    cl_term:
      id: CL:9900001
      label: dentate gyrus neuroblast
      name_in_source: neuroblast
    mapping_type: EXACT
    mapping_notes: 'CL:9900001 (dentate gyrus neuroblast, child of CL:0011020 neural progenitor cell) is an exact match —
      defined specifically as the DCX+ type-3 neuroblast stage in the dentate gyrus SGZ. This node encompasses the type-2b/type-3
      transitional and type-3 stages; atlas clusters 0511–0512 provide the transcriptomic correlates.

      '
  definition_references:
  - PMID:40519263
  - PMID:37082558
  - PMID:18385329
  - PMID:19482889
  - PMID:28168008
  - PMID:16157276
  - PMID:16341203
  is_terminal: false
  notes: 'The developmental sequence distinguishes type-2a (Nestin+/Sox2+), type-2b (Nestin+/DCX+), and type-3 (DCX+) stages.
    A transcription factor cascade (Pax6 > Ngn2 > Tbr2 > NeuroD > Tbr1) marks stage transitions (Hodge et al. 2008). Potential
    HETEROGENEITY: the three transit-amplifying stages may warrant separate nodes.

    '
