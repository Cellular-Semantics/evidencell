        node is defined by CRFR1 *receptor* expression. These are distinct
        populations: CRFR1+ PVN neurons receive CRH input, they do not necessarily
        secrete CRH. Mapping is RELATED only. No CL term for CRFR1-receptor-expressing
        neurons exists — potential CL contribution.
    is_terminal: false
    definition_references:
      - "PMID:31055007"
    notes: >
      Male-biased dimorphism (males > females). Sex difference emerges during
      puberty/early adulthood. Co-express estrogen receptor alpha (moderate) and
      androgen receptor (high), suggesting gonadal-hormone-dependent regulation.
      Single source (Rosinger 2019) for full characterization. CL:4072021
      (corticotropin-releasing neuron) is RELATED only — that term defines neurons
      by CRH *secretion*, while this node is defined by CRFR1 receptor expression.
      No exact CL term — candidate for new term.

