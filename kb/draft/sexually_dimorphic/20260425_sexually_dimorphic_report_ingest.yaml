name: "Sexually dimorphic hypothalamic and limbic neurons — draft KB"
description: >
  Evidence graph capturing classically defined sexually dimorphic neuron types
  in the hypothalamus and connected limbic regions (BNST, lateral septum).
  Nodes proposed from a single ASTA deep-research report; properties are
  literature-derived and have not yet been confirmed against primary papers
  or mapped to a community atlas. No mapping edges populated in this draft.

