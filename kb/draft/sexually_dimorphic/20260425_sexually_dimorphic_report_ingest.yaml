    morphology:
      description: >
        Sexually dimorphic population in VMHvl that controls sex-typical behaviors
        (mating in both sexes, fighting in males). Contains ERalpha+ neurons
        coordinating metabolism and reproduction in females; a subset co-expressing
        ERalpha + Nkx2-1 + Tac1 promotes hormone-dependent female locomotion. snRNA-
        seq identified 17 transcriptomic types, several sexually dimorphic. VMHvl is
        essential for lordosis behavior in females through projections to PAG,
        brainstem, and spinal motor circuits.
      sources:
        - ref: "PMID:25543145"
          method: "literature description"
          scope: "adult mouse"
