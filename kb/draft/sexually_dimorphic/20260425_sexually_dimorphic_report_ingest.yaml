edges:

  - id: edge_avpv_kiss1_neuron_to_cs20230722_supt_0486
    type_a: avpv_kiss1_neuron
    type_b: CS20230722_SUPT_0486
    relationship: PARTIAL_OVERLAP
    confidence: MODERATE
    evidence:
      - evidence_type: ATLAS_METADATA
        supports: PARTIAL
        explanation: >
          SUPT_0486 (PVpo-VMPO-MPN Hmx2 Gaba_5) is the highest-scoring supertype for
          AVPV-region preoptic GABAergic neurons. Precomputed expression confirms Esr1=7.72
          (defining marker for both classical node and supertype), Th=2.72, and Kiss1=0.62.
          The supertype contains n=16 cells labeled AVPV (MBA:272). Child cluster CLUS_1915
          (dopaminergic designation, male_female_ratio=0.02) is the strongest sub-resolution
          candidate for the female-biased AVPV Kiss1/TH population. PARTIAL_OVERLAP because
          SUPT_0486 spans a broader preoptic zone than the AVPV/PeN.
    property_comparisons:
      - property: nt_type
        node_a_value: "GABAergic / dopaminergic (Th co-expression)"
        node_b_value: "GABAergic (Gaba_5 label)"
        alignment: APPROXIMATE
        notes: >
          GABAergic concordant; dopaminergic component present at supertype level
          (Th=2.72) but diluted. Resolved at cluster level by CLUS_1915 (nt_type=Dopa).
      - property: location_MBA272
        node_a_value: "MBA:272 (AVPV)"
        node_b_value: "MBA:272 (AVPV) n=16; MBA:133 PVpo n=64; MBA:515 MPN n=37"
        alignment: APPROXIMATE
        notes: Direct AVPV location match (n=16); supertype spans broader preoptic zone.
      - property: marker_Kiss1
        node_a_value: "POSITIVE (transcript, defining marker)"
        node_b_value: "precomputed mean_expression=0.62"
        alignment: APPROXIMATE
        notes: Present but low-moderate at supertype level; consistent with subset expression.
      - property: marker_Esr1
        node_a_value: "POSITIVE (transcript, defining marker)"
        node_b_value: "precomputed mean_expression=7.72 (DEFINING atlas marker)"
        alignment: CONSISTENT
      - property: marker_Th
        node_a_value: "POSITIVE (protein, co-expressed with Kiss1)"
        node_b_value: "precomputed mean_expression=2.72"
        alignment: APPROXIMATE
      - property: sex_ratio
        node_a_value: "female-biased (AVPV Kiss1 neurons strongly female-biased)"
        node_b_value: "child CLUS_1915 male_female_ratio=0.02 (extreme female bias)"
        alignment: CONSISTENT
        notes: >
          Sex ratio confirmed at child-cluster level. CLUS_1915 (Kiss1=2.51, Th=6.6, Esr1=9.55)
          is the only child cluster co-expressing both Kiss1 and Th at high levels and the most
          strongly female-biased cluster in SUPT_0486 (MFR=0.02). Supertype-level sex ratio
          not available in DB.
      - property: annotation_transfer_f1
        node_a_value: "not applicable"
        node_b_value: "NOT_ASSESSED"
        alignment: NOT_ASSESSED
        notes: Annotation transfer not yet run for avpv_kiss1_neuron. Priority experiment.
    caveats:
      - caveat_type: AMBIGUOUS_MAPPING
        description: >
          SUPT_0486 spans PVpo-VMPO-MPN and contains multiple preoptic cell types.
          avpv_kiss1_neuron, avpv_th_neuron, and mpoa_esr1_neuron all map to SUPT_0486,
          reflecting the heterogeneity of this preoptic GABAergic supertype. AVPV Kiss1
          neurons are a subset.
      - caveat_type: TAXONOMY_LEVEL_MISMATCH
        description: >
          Supertype-level sex ratio not directly available. Female-biased sex ratio signal is
          concentrated in child cluster CLUS_1915 (male_female_ratio=0.02). A cluster-level
          edge to CLUS_1915 would provide more specific mapping.
    unresolved_questions:
      - >
        Which cluster(s) within SUPT_0486 carry peak Kiss1+Th+Esr1 co-expression
        consistent with AVPV Kiss1/TH identity?
      - >
        Do PeN (MBA:341) Kiss1 neurons map to SUPT_0486 or a different supertype?
    proposed_experiments:
      - >
        Inspect child clusters of SUPT_0486 for Kiss1, Th, Esr1 co-expression at
        cluster level to identify the AVPV Kiss1/TH candidate cluster.
      - >
        MapMyCells annotation transfer of published AVPV Kiss1 scRNA-seq data to WMBv1.

