            method: "literature description"
            scope: "adult mouse"
            quote_key: "237425192_b8087ed0"
    morphology:
      description: >
        Highly sexually dimorphic in distribution and projection patterns. The MPOA is
        larger and contains more neurons in males than females. Esr1+ neurons are
        highly expressed in the MPOA and are involved in both parental behaviors and
        male-type mating behaviors. The Esr1+ population overlaps with steroid hormone
        receptor-expressing neurons (Ar, Pgr) enriched in the MPOA. Differential
        effects of circulating steroids between sexes (estrogen in females,
        testosterone in males) underlie sexually dimorphic features of the MPOA.
      sources:
        - ref: "PMID:33910083"
          method: "literature description"
          scope: "adult mouse"
          quote_key: "233446934_5d0fb07e"
    cl_mapping: null
    is_terminal: false
    definition_references:
      - "PMID:33910083"
      - "https://doi.org/10.1101/2021.09.02.458782"
    notes: >
      Heterogeneous population — MPOA contains both GABAergic and glutamatergic
      neurons and may be better represented as multiple terms. MPOA Esr1 neurons are
      required (alongside galanin neurons) for pup-directed/parental behavior. Esr1
      governs male-type mating behavior; overlapping Nts (neurotensin)+ neurons
      govern female socio-sexual behaviors. No CL term — candidate for new term(s).

