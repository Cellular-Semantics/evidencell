# ══════════════════════════════════════════════════════════════════
# EDGES — OLM classical type → WMBv1 atlas candidates
# All edges LOW confidence from atlas metadata only.
# Upgrade path: Chrna2-Cre + MapMyCells, patch-seq, lit review.
# ══════════════════════════════════════════════════════════════════

edges:

  # ── Edge 1: OLM → wmb_clus_0727 (Lamp5 Lhx6 Gaba_1) ──────────
  # SURPRISING CANDIDATE: Lamp5 Lhx6 subclass, not Sst

  - id: edge_olm_to_wmb_clus_0727
    type_a: olm_hippocampus
    type_b: CS20230722_CLUS_0727
    relationship: TYPE_A_SPLITS
    confidence: LOW
    evidence:
      - evidence_type: ATLAS_METADATA
        supports: PARTIAL
        explanation: >
          Partial property overlap. GABA consistent. CA3 SO + SLM match OLM anatomy.
          Sst and Pnoc neuropeptides present but Npy absent. Subclass is Lamp5 Lhx6,
          NOT Sst — discordant with canonical OLM identity. Chrna2/Grm1 not assessable.
      - evidence_type: ANNOTATION_TRANSFER
        run_ref: at_run_20260408_winterer_olm_mmc_wmbv1
        supports: REFUTE
        explanation: >
          MapMyCells annotation transfer of 46 OLM interneurons (GSE124847, Winterer 2019)
          mapped 0/46 cells to Lamp5 Lhx6 subclass. All 45 successfully classified cells
          mapped to Sst Gaba subclass (Sst Gaba_3 supertype). Zero support for this
          Lamp5 Lhx6 cluster as an OLM target.
        target_atlas: "WMBv1 (CCN20230722)"
        method: "MapMyCells (cell_type_mapper v1.7.1, default parameters, raw normalization)"
        source_species: {id: "NCBITaxon:10090", label: "Mus musculus", name_in_source: "Mus musculus"}
        target_species: {id: "NCBITaxon:10090", label: "Mus musculus", name_in_source: "Mus musculus"}
        source_dataset_accession: "GEO:GSE124847"
        source_cluster_label: "Sst-OLM + Htr3a-OLM (combined)"
        best_f1_score: 0.0
        best_mapping_level: "SUBCLASS"
        n_cells_total: 46
        n_cells_after_filter: 0
        bootstrap_threshold: 0.8
        tool_version: "cell_type_mapper v1.7.1"
    property_comparisons:
      - property: nt_type
        node_a_value: "GABAergic"
        node_b_value: "GABA"
        alignment: CONSISTENT
      - property: location
        node_a_value: "stratum oriens (UBERON:0005371); SLM (UBERON:0007637)"
        node_b_value: "CA3 SO (MBA:486); CA3 SLM (MBA:471)"
        alignment: APPROXIMATE
        notes: "SO and SLM present. CA3-enriched, not CA1."
      - property: marker_Sst
        node_a_value: "Sst — defining marker"
        node_b_value: "Sst in neuropeptides, NOT defining_markers; Lamp5 Lhx6 subclass"
        alignment: APPROXIMATE
        notes: "Sst expressed but not defining. Subclass is Lamp5 Lhx6, not Sst."
      - property: marker_Chrna2
        node_a_value: "Chrna2 — defining marker"
        node_b_value: "not present"
        alignment: NOT_ASSESSED
      - property: marker_mGluR1
        node_a_value: "mGluR1 (Grm1) — confirmed 96% detection in OLM scRNA-seq (GSE124847)"
        node_b_value: "not resolvable from atlas metadata"
        alignment: NOT_ASSESSED
        notes: "Source-side Grm1 expression now quantified (44/46 OLM cells). Atlas-side still unresolvable — Grm1 not in cluster-level defining_markers or neuropeptides."
      - property: neuropeptide_Sst
        node_a_value: "Sst"
        node_b_value: "present"
        alignment: CONSISTENT
      - property: neuropeptide_Npy
        node_a_value: "Npy"
        node_b_value: "absent"
        alignment: DISCORDANT
        notes: "OLM expresses Npy; this cluster does not."
      - property: neuropeptide_Pnoc
        node_a_value: "Pnoc"
        node_b_value: "present"
        alignment: CONSISTENT
    caveats:
      - caveat_type: OTHER
        description: >
          Lamp5 Lhx6 subclass (CGE-derived), not Sst (MGE-derived). Biologically
          surprising for canonical Sst+ MGE-derived OLM. Requires independent validation.
      - caveat_type: MARKER_NOT_SPECIFIC
        description: "Chrna2 and mGluR1 not resolvable from atlas metadata."
    unresolved_questions:
      - "Is Sst expression in this Lamp5 Lhx6 cluster biologically meaningful? OLM morphology/ephys present?"
    proposed_experiments:
      - "Patch-seq of Lamp5-Lhx6 neurons in CA3 stratum oriens."
      - "Chrna2-Cre + MapMyCells to test Chrna2+ neuron mapping."

  # ── Edge 2: OLM → wmb_clus_0785 (Sst Gaba_6) ─────────────────

  - id: edge_olm_to_wmb_clus_0785
    type_a: olm_hippocampus
    type_b: CS20230722_CLUS_0785
    relationship: TYPE_A_SPLITS
    confidence: UNCERTAIN
    evidence:
      - evidence_type: ATLAS_METADATA
        supports: PARTIAL
        explanation: >
          Sst subclass and GABA consistent. CA3 SO + SLM match OLM anatomy. However,
          Chrna2 expression absent from parent supertype Sst Gaba_6 per ABC Atlas
          (HPF/GABA/Chrna2 filter). Chrna2 is a defining OLM marker — its absence
          argues against this cluster containing OLM cells.
      - evidence_type: ATLAS_QUERY
        supports: REFUTE
        atlas: "ABC Atlas"
        query_url: "https://tinyurl.com/a4f3kd4v"
        filters_applied: "anatomy=HPF; NT=GABA; expression=Chrna2"
        explanation: >
          Filtering the ABC Atlas on HPF anatomy, GABAergic NT, and Chrna2 expression
          eliminates the Sst Gaba_6 supertype entirely. Chrna2 is a defining marker
          of OLM interneurons; its absence from this supertype argues against any
          cluster within it being OLM.
      - evidence_type: ANNOTATION_TRANSFER
        run_ref: at_run_20260408_winterer_olm_mmc_wmbv1
        supports: REFUTE
        explanation: >
          MapMyCells annotation transfer of 46 OLM interneurons (GSE124847, Winterer 2019)
          mapped 0/46 cells to Sst Gaba_6 supertype. All 45 successfully classified cells
          mapped to Sst Gaba_3 supertype instead. Zero support for this Sst Gaba_6 cluster
          as an OLM target.
        target_atlas: "WMBv1 (CCN20230722)"
        method: "MapMyCells (cell_type_mapper v1.7.1, default parameters, raw normalization)"
        source_species: {id: "NCBITaxon:10090", label: "Mus musculus", name_in_source: "Mus musculus"}
        target_species: {id: "NCBITaxon:10090", label: "Mus musculus", name_in_source: "Mus musculus"}
        source_dataset_accession: "GEO:GSE124847"
        source_cluster_label: "Sst-OLM + Htr3a-OLM (combined)"
        best_f1_score: 0.0
        best_mapping_level: "SUPERTYPE"
        n_cells_total: 46
        n_cells_after_filter: 0
        bootstrap_threshold: 0.8
        tool_version: "cell_type_mapper v1.7.1"
    property_comparisons:
      - property: nt_type
        node_a_value: "GABAergic"
        node_b_value: "GABA"
        alignment: CONSISTENT
      - property: location
        node_a_value: "stratum oriens (UBERON:0005371); SLM (UBERON:0007637)"
        node_b_value: "CA3 SO (MBA:486, 39 cells); CA3 SLM (MBA:471, 11 cells)"
        alignment: APPROXIMATE
        notes: "SO and SLM present. CA3-enriched, not CA1."
      - property: marker_Sst
        node_a_value: "Sst — defining marker"
        node_b_value: "Sst subclass"
        alignment: CONSISTENT
      - property: marker_Chrna2
        node_a_value: "Chrna2 — defining marker"
        node_b_value: "absent from Sst Gaba_6 supertype per ABC Atlas"
        alignment: DISCORDANT
        notes: >
          ABC Atlas filter (HPF/GABA/Chrna2) eliminates Sst Gaba_6.
          https://tinyurl.com/a4f3kd4v
      - property: marker_mGluR1
        node_a_value: "mGluR1 (Grm1) — confirmed 96% detection in OLM scRNA-seq (GSE124847)"
        node_b_value: "not resolvable from atlas metadata"
        alignment: NOT_ASSESSED
        notes: "Source-side Grm1 expression now quantified (44/46 OLM cells). Atlas-side still unresolvable — Grm1 not in cluster-level defining_markers or neuropeptides."
      - property: neuropeptide_Sst
        node_a_value: "Sst"
        node_b_value: "present"
        alignment: CONSISTENT
      - property: neuropeptide_Npy
        node_a_value: "Npy"
        node_b_value: "present"
        alignment: CONSISTENT
      - property: neuropeptide_Pnoc
        node_a_value: "Pnoc"
        node_b_value: "absent"
        alignment: DISCORDANT
        notes: "OLM expresses Pnoc; absent from this cluster."
    caveats:
      - caveat_type: MARKER_NOT_SPECIFIC
        description: >
          Chrna2 absent from Sst Gaba_6 supertype — discordant with OLM identity.
          mGluR1 not resolvable.
      - caveat_type: OTHER
        description: "CA3-enriched; classical OLM best characterized in CA1."
    unresolved_questions:
      - "Given Chrna2 absence, is this cluster a non-OLM Sst stratum oriens type?"

  # ── Edge 3: OLM → wmb_clus_0769 (Sst Gaba_3) ─────────────────

