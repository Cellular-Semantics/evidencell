  - id: olm_hippocampus
    name: "Oriens-Lacunosum Moleculare (O-LM) interneuron"
    definition_basis: CLASSICAL_MULTIMODAL
    species: null  # described in rat (Rattus norvegicus) and mouse (Mus musculus); species-specific nodes pending
    anatomical_location:
      - id: UBERON:0014548
        label: "stratum oriens of hippocampus"
        name_in_source: "CA1 stratum oriens"
        compartment: SOMA
      - id: UBERON:0007637
        label: "stratum lacunosum-moleculare of hippocampus"
        name_in_source: "stratum lacunosum-moleculare"
        compartment: AXON_TARGET
    location_sources:
      - ref: "PMID:20421280"
        method: "biocytin fill + light microscopy"
        scope: "adult rat CA1"
        quote_key: "3106274_e54f60e9"
      - ref: "PMID:29487503"
        method: "biocytin fill + DAB staining"
        scope: "mouse dorsal CA1"
        quote_key: "3591966_2414c9e9"
      - ref: "PMID:33361464"
        method: "computational axonal-dendritic overlap"
        scope: "rodent CA1"
        quote_key: "229694907_6865b9db"
    nt_type:
      name_in_source: "GABAergic"
      cl_terms:
        - id: CL:0000617
          label: "GABAergic neuron"
          name_in_source: "GABAergic"
      sources:
        - ref: "PMID:26021702"
          method: "electrophysiology (inhibitory interneuron identification)"
          scope: "rat CA1"
          quote_key: "15101210_5604b9a4"
        - ref: "PMID:10777798"
          method: "GAD-GFP transgenic line"
          scope: "mouse hippocampus"
          quote_key: "13398453_9154fc23"
    defining_markers:
      - symbol: Sst
        ncbi_gene_id: null
        sources:
          - marker_type: PROTEIN
            ref: "PMID:10804195"
            method: "in situ hybridization"
            scope: "mouse CA1 stratum oriens"
            quote_key: "6652630_215c5f40"
          - marker_type: TRANSCRIPT
            ref: "PMID:31420995"
            method: "single-cell RNA-seq"
            scope: "mouse hippocampus"
            quote_key: "201041756_69dc904d"
          - marker_type: TRANSCRIPT
            ref: "PMID:31420995"
            method: "scRNA-seq raw counts (GSE124847, re-analysis)"
            scope: "mouse hippocampus OLM cells"
            notes: "Detected in 46/46 cells (100%); mean counts 305273. Universally expressed in both Sst-OLM and Htr3a-OLM subtypes."
      - symbol: Chrna2
        ncbi_gene_id: null
        sources:
          - marker_type: TRANSCRIPT
            ref: "PMID:29487503"
            method: "Chrna2-Cre transgenic line"
            scope: "mouse dorsal CA1"
            quote_key: "3591966_644f1e68"
          - marker_type: TRANSCRIPT
            ref: "PMID:23042082"
            method: "Chrna2-Cre transgenic line + optogenetics"
            scope: "mouse hippocampus"
            quote_key: "7952877_ae03c6e0"
          - marker_type: TRANSCRIPT
            ref: "PMID:31420995"
            method: "scRNA-seq raw counts (GSE124847, re-analysis)"
            scope: "mouse hippocampus OLM cells"
            notes: "Detected in 16/46 cells (35%); sparse expression. Htr3a-OLM 43% vs Sst-OLM 26%. Consistent with scattered Chrna2 at Sst Gaba_3 supertype level in WMBv1."
      - symbol: mGluR1
        ncbi_gene_id: null
        sources:
          - marker_type: PROTEIN
            ref: "PMID:10804195"
            method: "electrophysiology + in situ hybridization"
            scope: "mouse CA1"
            quote_key: "6652630_17d10a9e"
          - marker_type: TRANSCRIPT
            ref: "PMID:31420995"
            method: "scRNA-seq raw counts (GSE124847, re-analysis)"
            scope: "mouse hippocampus OLM cells"
            notes: "Grm1 detected in 44/46 cells (96%); mean counts 3901. Near-universal expression confirms mGluR1 as a robust OLM transcript-level marker."
    negative_markers:
      - symbol: PV
        modifier: ABSENT
        ncbi_gene_id: null
      - symbol: CB
        modifier: ABSENT
        ncbi_gene_id: null
      - symbol: CR
        modifier: ABSENT
        ncbi_gene_id: null
      - symbol: NOS
        modifier: ABSENT
        ncbi_gene_id: null
      - symbol: VIP
        modifier: ABSENT
