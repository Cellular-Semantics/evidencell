# Hippocampus GABA stratum oriens — OLM mapping to WMBv1
# Sources: hippocampus_GABA_stratum_oriens.json (taxonomy), OLM_Neurons_asta_report.pdf (classical)
# Ingested: 2026-03-25
# Status: DRAFT — initial discovery mapping; evidence gaps to be filled by lit review
# SCHEMA_CANDIDATE fields preserved as comments — see field_mapping.json

name: "Hippocampus GABA stratum oriens — OLM to WMBv1"
description: >
  Evidence graph mapping the classically defined Oriens-Lacunosum Moleculare (O-LM)
  interneuron to candidate cell sets in the WMBv1 atlas (CCN20230722). Classical node
  from ASTA report ingest; 12 supertype + 49 cluster atlas stubs from taxonomy ingest.
  Mapping edges at LOW/UNCERTAIN confidence pending lit review.

brain_region:
  id: UBERON:0005370
  label: "stratum oriens of hippocampal formation"
  name_in_source: "stratum oriens"

target_atlas: "WMBv1"

species:
  id: NCBITaxon:10090
  label: Mus musculus
  name_in_source: "Mus musculus"

creation_date: "2026-03-25"


