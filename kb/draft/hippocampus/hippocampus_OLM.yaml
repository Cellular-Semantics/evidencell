            notes: "Detected in 46/46 cells (100%); see defining_markers.Sst for full detail."
      - symbol: Npy
        ncbi_gene_id: null
        sources:
          - marker_type: TRANSCRIPT
            ref: "PMID:31420995"
            method: "single-cell RNA-seq"
            scope: "mouse hippocampus"
            quote_key: "201041756_8d16e821"
          - marker_type: TRANSCRIPT
            ref: "PMID:31420995"
            method: "scRNA-seq raw counts (GSE124847, re-analysis)"
            scope: "mouse hippocampus OLM cells"
            notes: "Detected in 37/46 cells (80%); mean counts 18709. Present in both subtypes (Sst-OLM 70%, Htr3a-OLM 91%)."
      - symbol: Pnoc
        ncbi_gene_id: null
        sources:
          - marker_type: TRANSCRIPT
            ref: "PMID:40757734"
            method: "single-cell transcriptomic cluster analysis"
            scope: "mouse hippocampus"
            quote_key: "280420054_8a6529c5"
          - marker_type: TRANSCRIPT
            ref: "PMID:31420995"
            method: "scRNA-seq raw counts (GSE124847, re-analysis)"
            scope: "mouse hippocampus OLM cells"
            notes: "Detected in 27/46 cells (59%); mean counts 1389. Moderate penetrance — consistent with Pnoc marking a subset of OLM cells (cf. Thulin et al. 2025 Sst/Pnoc subclusters)."
    morphology_notes: >
      Large horizontally-oriented soma at oriens/alveus border. Horizontal dendrites
      in stratum oriens, densely decorated with long spines. Axon projects vertically
      through pyramidale and radiatum, ramifies extensively in stratum lacunosum-moleculare
      with dense terminal arborizations and heavily packed varicosities. Some axon
      collaterals with boutons in stratum oriens.
    morphology_sources:
      - ref: "PMID:20421280"
        method: "biocytin fill + light microscopy"
        scope: "adult rat CA1"
        quote_key: "3106274_e54f60e9"
      - ref: "PMID:33991454"
        method: "biocytin fill + reconstruction"
        scope: "mouse CA1"
        quote_key: "234597703_fda66a57"
      - ref: "PMID:10804195"
        method: "intracellular fill + reconstruction"
        scope: "mouse CA1 stratum oriens"
        quote_key: "6652630_6ba030f8"
    electrophysiology_class: >
      Regular-to-fast spiking with tonic or mildly adapting firing. Pronounced sag
      response to hyperpolarizing current (Ih via HCN2 h-channels). Theta spiking
      resonance. High input resistance, slow membrane time constants. Anti-Hebbian LTP
      dependent on Ca2+-permeable AMPA receptors. Phase-locked to theta rhythms (4-12 Hz).
    ephys_sources:
      - ref: "PMID:33093823"
        method: "whole-cell patch-clamp"
        scope: "SOM-YFP mouse, acute slice"
        quote_key: "221742877_26f1e4cc"
      - ref: "PMID:19176803"
        method: "whole-cell patch-clamp"
        scope: "rat CA1 O-LM cells"
        quote_key: "1015389_e9028538"
      - ref: "PMID:33991454"
        method: "whole-cell patch-clamp"
        scope: "mouse CA1"
        quote_key: "234597703_fda66a57"
    cl_mapping: null
    # No CL term found. Candidate for CL contribution.
    # Closest: CL:1001569 'hippocampal interneuron' (BROAD), CL:4023017 'sst GABAergic interneuron' (neocortex-defined)
    is_terminal: false
    definition_references:
      - "PMID:20421280"    # Zemankovics et al., 2010 — morphology + ephys
      - "PMID:29487503"    # Nichol et al., 2018 — Chrna2 marker, morphology
      - "PMID:23042082"    # Leao et al., 2012 — Chrna2, optogenetics, function
      - "PMID:39097181"    # Fernandez et al., 2024 — comprehensive OLM review
      - "PMID:25324774"    # Muller & Remy, 2014 — OLM review: morphology, markers, function
    notes: >
      HETEROGENEITY: The OLM class contains molecularly heterogeneous subpopulations.
      Zhang et al. (2025) report a PV-positive OLM subset that fires in the gamma range
      (vs theta for SST-only OLM cells). Thulin et al. (2025) identify three Sst/Pnoc
      subclusters with differential dorsal-ventral connectivity. These may warrant separate
      nodes in future iterations. TRPV1 expression (Hurtado-Zavala et al., 2017) is
      reported in a subpopulation but not confirmed by other sources. Lacaille 1987
      described O/A interneurons with axons branching in stratum oriens and pyramidale
      (not SLM) — these are likely a distinct population from canonical O-LM cells.
      Species: most morphology data from rat; marker/transgenic data from mouse.
      Cross-species validation pending.

