  neuropeptides: []
  morphology:
    description: Large hilar somata with thick bushy proximal dendrites encrusted with thorny excrescences (complex spines) receiving mossy fiber input from granule cells. Dendrites mainly in the hilus.
      ~25% of axon in hilar collaterals; >60% of axon distal in the molecular layer, predominantly the inner molecular layer (IML), with commissural projection to contralateral dentate gyrus. Dorsal MCs
      uniquely also project to the middle molecular layer (MML).
    sources:
    - ref: PMID:23420672
      quote_key: 11290620_a475a601
    - ref: PMID:33600026
      quote_key: 231953329_132cf2e1
    - ref: PMID:33600026
      quote_key: 231953329_6269a191
  electrophysiology:
    description: Regular-spiking firing pattern in hilar cells with thorny excrescences. Mossy cells produce unitary EPSPs in granule cells, confirming glutamatergic output.
    sources:
    - ref: PMID:23420672
      method: patch-clamp recording in slice
      scope: rat hippocampus
      quote_key: 11290620_a475a601
  cl_mapping:
    cl_term: null
    mapping_type: null
    mapping_notes: No CL term found for hilar mossy cell. Children of CL:4023062 (dentate gyrus neuron) include granule cell (CL:2000089), basket cell (CL:2000087), kisspeptin neuron (CL:4023124) and stellate
      cell (CL:2000090); none matches mossy cell. Potential CL contribution.
  definition_references:
  - PMID:33600026
  - PMID:34214666
  - PMID:28451637
  - PMID:23420672
  - PMID:25206826
  is_terminal: false
  notes: 'Dorsal vs. ventral mossy cells differ in axonal projection (dorsal: IML+MML; ventral: IML only). Reelin-positive mossy cells in the dentate hilus are predominantly glutamatergic (in contrast to
    GABAergic reelin+ cells in the molecular layer). HETEROGENEITY: dorsal/ventral subtypes likely warrant separate atlas correspondence.'
