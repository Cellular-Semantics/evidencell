  negative_markers: []
  neuropeptides: []
  morphology:
    description: 'Soma in stratum lacunosum-moleculare (SLM) and outer molecular layer (OML) of the hippocampal formation. Three axonal subtypes: (1) layer-restricted local-projecting CR cells acting as
      glutamatergic interneurons; (2) local-projecting CR cells whose axons cross the hippocampal fissure between SLM and OML; (3) long-range projecting CR cells targeting distant subregions. CR cells are
      biased toward targeting dendritic shafts of GABAergic interneurons over spines, and produce large-amplitude glutamatergic unitary postsynaptic potentials on interneurons. Reelin-positive CR cells
      increase in density with age in adult hippocampus.'
    sources:
    - ref: PMID:26582498
      quote_key: 2565845_ec963328
    - ref: PMID:26582498
      quote_key: 2565845_3bfe1a28
    - ref: PMID:26582498
      quote_key: 2565845_8c6a8b64
  electrophysiology:
    description: Optogenetic activation of CR cells in SLM elicits monosynaptic AMPA/NMDA receptor-mediated EPSCs in local interneurons (faster kinetics) and CA1 pyramidal cells (slower kinetics). Responses
      are blocked by TTX and rescued in interneurons by 4-AP, indicating direct monosynaptic CR cell-to-interneuron connection. Provides feedforward GABAergic input onto pyramidal cells via interneuron
      activation.
    sources:
    - ref: PMID:25253849
      method: optogenetic activation in slice
      scope: mouse hippocampus
      quote_key: 7165380_5e53cfc0
    - ref: PMID:26582498
      method: patch-clamp recording in slice
      scope: mouse hippocampus
      quote_key: 2565845_ec963328
  cl_mapping:
    cl_term:
      id: CL:0000695
      label: Cajal-Retzius cell
      name_in_source: Cajal-Retzius cell
    mapping_type: BROAD
    mapping_notes: CL:0000695 = Cajal-Retzius cell describes the general CR cell class across cortex and hippocampus; the proposed type is the specifically hippocampal, adult-persisting, glutamatergic subpopulation
      (reelin+/calretinin+/VGluT3+). The CL definition includes hippocampal SLM and OML localisation.
  definition_references:
  - PMID:25253849
  - PMID:26582498
  - PMID:25206826
  - PMID:26402459
  - DOI:10.1523/JNEUROSCI.1407-14.2014
  is_terminal: false
  notes: 'HETEROGENEITY: a substantial fraction of hippocampal CR cells are GABAergic; only the glutamatergic (reelin+/calretinin+/VGluT3+) subpopulation is captured here. Three axonal subtypes (layer-restricted
    local, cross-fissure local, long-range) likely warrant separate sub-nodes. AMBIGUITY: CR cells are more abundant in adult rat than previously assumed (Quattrocolo et al., 2014).'
