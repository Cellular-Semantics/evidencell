  electrophysiology:
    description: 'Highly heterogeneous firing in four subtypes: (1) fast-spiking with little AP accommodation, occasional spontaneous firing, sometimes pronounced Ih sag; (2) cluster-firing (8-14 Hz) with
      subthreshold membrane oscillations and strong AP accommodation — UNIQUE to glutamatergic MS-DBB neurons; (3) burst-firing (distinct from GABAergic burst pattern) with little/no sag; (4) slow-firing
      with broad accommodating APs. Can spontaneously fire rhythmically at theta frequencies. Activity rises before locomotion onset and during running.'
    sources:
    - ref: PMID:29250747
      quote_key: 21358766_0c242fdc
    - ref: PMID:21106833
      quote_key: 15897856_d5424e2a
