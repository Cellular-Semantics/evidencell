  - PMID:24319410
  - PMID:24592213
  - PMID:21927594
  - PMID:32009891
  is_terminal: false
  notes: Adult-born immature granule cells form a distinct functional subpopulation with delayed maturation; dorsal vs. ventral heterogeneity implied. Mossy fiber terminals co-express VGLUT1, VGLUT2, and
    VGAT (mixed transmission to CA3 in juvenile animals) — co-release is developmental and does not redefine the granule cell as a non-glutamatergic principal cell.
