  - PMID:29250747
  - PMID:21106833
  - PMID:32132227
  is_terminal: false
  notes: Four electrophysiologically distinct VGluT2+ subgroups (fast-spiking, cluster-firing, burst-firing, slow-firing). Cluster firing is a unique electrophysiological marker for glutamatergic (not GABAergic)
    MS-DBB neurons. Soma is extrahippocampal — node retained because the cell projects into hippocampal formation; UBERON soma assignment is approximate (hippocampal formation used as nearest umbrella term).
