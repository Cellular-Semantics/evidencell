  morphology:
    description: Compact granule cell soma in stratum granulosum; thin unmyelinated mossy fiber axons project into stratum lucidum of CA3. ~1 million GCs in adult rat dentate gyrus. 85% of GCs are generated
      postnatally; adult-born GCs receive their first glutamatergic input on dendritic spines at the end of the second week after birth.
    sources:
    - ref: PMID:24592213
      quote_key: 11333153_d0620f0a
    - ref: PMID:21927594
      quote_key: 16383828_d014308a
    - ref: PMID:24319410
      quote_key: 7458943_efa15be5
  electrophysiology:
    description: Lower firing threshold than typical cortical neurons; AMPA, kainate, and NMDA receptors broadly co-expressed. Mossy fiber stimulation elicits mixed GABAergic and glutamatergic monosynaptic
      currents in CA3 principal cells in juvenile animals.
    sources:
    - ref: PMID:24592213
      quote_key: 11333153_abe1b682
    - ref: PMID:37011759
      quote_key: 252086716_f9c70b51
    - ref: PMID:33132900
      quote_key: 222135486_f65faa4b
