name: "OLM Interneuron — Hippocampus CA1"
description: >
  Draft evidence graph for the Oriens-Lacunosum Moleculare (O-LM) interneuron
  of hippocampal CA1. Classical type defined by morphology (soma/dendrites in
  stratum oriens, axon projecting to stratum lacunosum-moleculare), SST expression,
  and characteristic electrophysiological properties (sag response, theta-locked
  firing). No matching CL term exists — candidate for CL contribution.

