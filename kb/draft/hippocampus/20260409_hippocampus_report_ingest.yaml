        label: "basket cell"
        name_in_source: "basket cell"
      mapping_type: BROAD
      mapping_notes: >
        CL:0000118 covers perisomatic-targeting GABAergic interneurons but does
        not capture PV-specific identity. No hippocampus-specific PV basket cell
        term exists in CL.
    definition_references:
      - "PMID:7472426"
      - "PMID:29383328"
      - "PMID:33150866"
      - "PMID:29321728"
      - "PMID:26441554"
    is_terminal: false
    notes: >
      Four morphological subtypes within PV+ INs (basket, axo-axonic, bistratified,
      radiatum-targeting). 7-14 PV transcriptomic subtypes in CA1. Activity inversely
      coupled with CCK basket cell activity.

