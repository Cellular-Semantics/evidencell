      spines; axon projects perpendicularly through SR to stratum
      lacunosum-moleculare where it forms dense varicose terminal arbor;
      collateral axons also in stratum oriens. Large elongated soma at
      oriens-alveus border. Stereotyped morphology first described by Cajal (1893).
