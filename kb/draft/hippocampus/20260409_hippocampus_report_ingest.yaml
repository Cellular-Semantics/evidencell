            method: "immunohistochemistry"
            scope: "rat hippocampus"
            quote_key: "10540334_418c51dd"
    neuropeptides: []
    electrophysiology_class: >
      Fast-spiking (80% of PV+ INs); sustained firing >200 Hz; bursts up to
      150 Hz during ripples; short-duration APs with large rapid AHPs
    ephys_sources:
      - ref: "PMID:33150866"
        method: "patch clamp"
        scope: "mouse hippocampus"
        quote_key: "221276443_e917908b"
      - ref: "PMID:29383328"
        method: "in vivo recording"
        scope: "mouse CA1"
        quote_key: "19055431_b2536ef6"
      - ref: "PMID:29321728"
        method: "review"
        scope: "hippocampus/neocortex"
        quote_key: "38778375_462ec931"
    morphology_notes: >
      Perisomatic-targeting interneuron forming dense plexus of inhibitory
      terminals on soma of pyramidal cells; axon collaterals confined to
      pyramidal layer; single basket cell contacts >1500 pyramidal neurons
      and 60 other PV+ interneurons
    morphology_sources:
      - ref: "PMID:7472426"
        method: "biocytin fill in vivo"
        scope: "rat CA1"
        quote_key: "10664418_9acd7ec1"
