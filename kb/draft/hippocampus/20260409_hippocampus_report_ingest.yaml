    definition_references:
      - "PMID:20421280"
      - "PMID:31420995"
      - "PMID:33093823"
      - "PMID:29487503"
      - "PMID:37652281"
    is_terminal: false
    notes: >
      No CL term exists for OLM cell. CL:4023017 'sst GABAergic interneuron'
      is nearest superclass but does not capture OLM-specific morphology.
      Molecularly heterogeneous: contains a PV+ subpopulation with distinct
      theta vs gamma coupling. Npy expression is consistent in mouse but
      absent in rat (species difference). Ndnf::Nkx2-1 intersection selectively
      targets OLM cells. At least 3 Chrna2+ subclusters identified.

