  morphology_sources:
  - ref: PMID:24671999
    method: electron microscopy
    scope: rat CA1
    quote_key: 23480858_1f4801fb
  - ref: PMID:37467748
    method: review
    scope: hippocampus
    quote_key: 259953057_09a50fe2
  - ref: PMID:24671999
    snippet: IS3 cells in the mouse hippocampus were similar to those described originally in the rat hippocampus. These cells
      innervated heavily the O/A border, although occasional axonal branches were found in the RAD and PYR. Their dendritic
      arbors were often unipolar (47% of cells), suggesting that these cells are preferentially recruited through the activation
      of the Schaffer collaterals
    support: SUPPORT
    source: cite_traverse_2026_04_10
  - ref: PMID:24671999
    snippet: In several cases (n ϭ 5 slices/2 animals), the dendrites of 2-3 CR-positive cells of this subtype were found
      to form dendro-dendritically connected clusters (Fig. 6C1, top inset), which is a hallmark of the type I interneuron-specific
      (IS1) interneuron described previously in the rat CA1 hippocampus
    support: SUPPORT
    source: cite_traverse_2026_04_10
  cl_mapping:
    cl_term:
      id: CL:4023016
      label: VIP GABAergic interneuron
      name_in_source: VIP interneuron
    mapping_type: BROAD
    mapping_notes: 'CL:4023016 captures VIP+ subset (IS-2 and IS-3) but not IS-1 (CR+/VIP-). The defining functional feature
      — selective interneuron targeting for disinhibition — is not encoded in any CL term.

      '
  definition_references:
  - PMID:24671999
  - PMID:37467748
  - PMID:39401246
  is_terminal: false
  notes: 'Three subtypes: IS-1 (CR+), IS-2 (VIP+), IS-3 (CR+/VIP+). Majority of VIP subclass are IS cells. Ephys not extensively
    characterized. CL mapping only covers VIP+ subtypes.

    [cite_traverse_2026_04_10] PMID:23162426: a subgroup of interneurons, the so-called interneuron-specific (IS) interneurons,
    specializes in innervating exclusively other GABAergic cells

    '
