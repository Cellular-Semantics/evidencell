caveats: >
  Source dataset has only 46 OLM cells (Winterer 2019); 45 retained after
  bootstrap filtering. The "Sst-OLM" and "Htr3a-OLM" source labels reflect
  Cre-driver subgroups in the Winterer dataset and are scored separately.
  At cluster (rank 0) resolution F1 is low across all candidates (max 0.26
  for Sst-OLM → CLUS_0768 within Sst Gaba_3 supertype) — the OLM cell type
  is captured at supertype/subclass level (Sst Gaba_3 / Sst Gaba; F1 ≈ 0.65)
  but scatters across sibling clusters. This is a real biological signal,
  not a methodological failure: OLM is a transcriptomic subtype not yet
  resolved at WMBv1 cluster rank.

