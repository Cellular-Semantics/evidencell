description: >
  TRAP-seq (translating-ribosome-affinity-purification + RNA-seq) of Esr1+
  neurons from four mouse brain regions across three sex/state categories.
  Knoedler et al. 2022 also profile ATAC-seq and behaviour, but only the
  bulk RNA-seq is ingested here.

  Design: 4 regions (BNST, MeA, POA, VMH) × 3 states (Male, FR = female-receptive,
  FNR = female-non-receptive) × 3 biological replicates = 36 samples.

  Processed normalized gene-count matrices (DESeq2 size-factor) are available
  per region; gene symbols (not Ensembl) — symbol→Ensembl mapping required
  before correlating against an Ensembl-keyed atlas.

