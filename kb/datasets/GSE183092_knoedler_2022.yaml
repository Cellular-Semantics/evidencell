notes: >
  Used in corr_run_20260428_knoedler_esr1_wmbv1 to support edge mappings for
  vmhvl_esr1_pr_neuron, mpoa_esr1_neuron, bnst_crf_neuron (Esr1 proxy), and
  candidate MeA Esr1+ classical type. Cross-region within-state contrasts
  (POA_FR vs VMH_FR etc.) produce informative δ rankings; cross-sex
  within-region contrasts (POA_Male vs POA_FR etc.) produce an artefactual
  signal — see the run's caveats and README. TRAP-seq vs scRNA-seq pseudobulk
  has known compositional differences (polysome-bound mRNA vs total mRNA);
  Spearman handles the magnitude offset, but absolute ρ values run lower than
  for FACS-bulk inputs.
